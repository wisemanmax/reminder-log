var loadStatus={};
function loadScript(url,name){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');s.src=url;s.crossOrigin='anonymous';
    s.onload=function(){loadStatus[name]='ok';resolve();};
    s.onerror=function(){loadStatus[name]='FAILED';reject(new Error(name+' failed from '+url));};
    document.head.appendChild(s);
  });
}

}

<script type="text/plain" id="app-src">
const{useState,useEffect,useReducer,useCallback,useMemo,useRef}=React;
const _Recharts=typeof Recharts!=='undefined'?Recharts:{};
const{BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,LineChart,Line}=_Recharts;
const hasCharts=typeof Recharts!=='undefined';

// ─── Reduced Motion Detection ───
const prefersReducedMotion=()=>{try{return window.matchMedia("(prefers-reduced-motion: reduce)").matches;}catch(e){return false;}};
const animDur=(ms)=>prefersReducedMotion()?"0s":(ms/1000)+"s";
const animStyle=(name,dur,ease="ease",fill="both")=>prefersReducedMotion()?{}:{animation:`${name} ${dur/1000}s ${ease} ${fill}`};

// ─── Utilities ───
const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.warn("Error:",e);}},
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);

// ─── Cookie (SSO across .ironlog.space) ───
const Cookie={
  get:(name)=>{const m=document.cookie.match(new RegExp("(^| )"+name+"=([^;]+)"));return m?decodeURIComponent(m[2]):null;},
  set:(name,value,days=30)=>{const exp=new Date(Date.now()+days*864e5).toUTCString();document.cookie=`${name}=${encodeURIComponent(value)};
const SYNC_URL=LS.get("ft-api-url")||"https://api.ironlog.space";
const AuthToken={
  // Legacy — kept for backward compat during migration
  init:(email)=>{},
  generate:(email)=>"",
  getHeaders:(email)=>{
    const sessionToken=LS.get("ft-session-token");
    return{
      "Content-Type":"application/json",
      ...(sessionToken?{"X-Session-Token":sessionToken}:{}),
      "X-Auth-Token":email||"legacy",
    };
const SessionManager={
  // Create session after signup (called with email + PIN)
  create:async(email,pin,deviceId)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"create",email:email.toLowerCase(),pin,deviceId:deviceId||LS.get("ft-device-id")})
      });
      const json=await res.json();
      if(json.success&&json.token){
        LS.set("ft-session-token",json.token);
        LS.set("ft-session-email",email.toLowerCase());
        LS.set("ft-session-expires",json.expires_at);
        Cookie.set("ironlog_session",json.token,30); // SSO across subdomains
        return{success:true,token:json.token};
      }
      return{success:false,error:json.error,attempts_remaining:json.attempts_remaining};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
  // Check if we have a valid session
  hasSession:()=>{
    const token=LS.get("ft-session-token");
    const expires=LS.get("ft-session-expires");
    if(!token)return false;
    if(expires&&new Date(expires)<new Date()){LS.set("ft-session-token",null);return false;}
    return true;
  },
  // Revoke (logout)
  revoke:async()=>{
    const token=LS.get("ft-session-token");
    if(token){try{await fetch(`${SYNC_URL}/api/auth/session`,{method:"POST",headers:{"Content-Type":"application/json","X-Session-Token":token},body:JSON.stringify({action:"revoke",token})});}catch(e){}}
    SentryUtil.breadcrumb("User signed out","auth");SentryUtil.reset();
    LS.set("ft-session-token",null);LS.set("ft-session-email",null);LS.set("ft-session-expires",null);LS.set("ft-is-admin",null);
    Cookie.clear("ironlog_session"); // Clear SSO cookie
  },
  // Check admin status (silent — never exposes admin to non-admins)
  checkAdmin:async()=>{
    const token=LS.get("ft-session-token");
    const email=LS.get("ft-session-email")||LS.get("ft-profile")?.email;
    if(!token&&!email)return false;
    try{
      const headers={"Content-Type":"application/json"};
      if(token)headers["X-Session-Token"]=token;
      if(email)headers["X-Auth-Token"]=email;
      const res=await fetch(`${SYNC_URL}/api/admin`,{method:"POST",headers,
        body:JSON.stringify({action:"check"})});
      if(res.ok){const json=await res.json();if(json.isAdmin){LS.set("ft-is-admin",true);return true;}}
      LS.set("ft-is-admin",null);return false;
    }catch(e){return false;}
  },
  // ─── Forgot PIN (satellite apps — canonical /api/auth/session) ───
  sendResetCode:async(email)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"send_reset_code",email:email.toLowerCase()})});
      return res.ok?{success:true}:{success:false,error:"Email not found"};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
  verifyResetCode:async(email,code)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"verify_reset_code",email:email.toLowerCase(),code})});
      return res.ok?{success:true}:{success:false,error:"Invalid code"};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
  setNewPin:async(email,code,newPin)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"set_new_pin",email:email.toLowerCase(),resetToken:code,newPin})});
      return res.ok?{success:true}:{success:false,error:"Reset failed"};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
};
// ─── Cloud Sync (reminderlog) ───
let _syncTimer=null;let _syncInFlight=false;
const CloudSync={
  push:async(state)=>{
    if(_syncInFlight)return;
    const email=state.profile?.email||LS.get("ft-session-email");
    if(!email)return;
    _syncInFlight=true;
    const payload=JSON.stringify({
      email,
      deviceId:LS.get("ft-device-id")||"unknown",
      appVersion:"reminderlog-1.0",
      workouts:[],nutrition:[],body:[],photos:[],checkins:[],milestones:[],
      settings:{goals:null,units:null,schedule:null,exercises:null,
        phases:[],injuries:[],privacy:{},supplements:[],accountability:[],gamification:null},
    });
    try{
      const res=await fetch(`${SYNC_URL}/api/sync/push`,{method:"POST",headers:AuthToken.getHeaders(email),body:payload});
      if(res.status===401){LS.set("ft-session-token",null);_syncInFlight=false;return;}
      if(!res.ok)throw new Error("Push failed");
    }catch(e){console.warn("Sync push error:",e);}
    _syncInFlight=false;
  },
  debouncedPush:(state)=>{
    if(_syncTimer)clearTimeout(_syncTimer);
    _syncTimer=setTimeout(()=>CloudSync.push(state),3000);
  },
  pull:async(email,deviceId,pin)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/sync/pull`,{
        method:"POST",
        headers:AuthToken.getHeaders(email),
        body:JSON.stringify({email,deviceId,pin:pin||null}),
      });
      const json=await res.json();
      if(res.status===403&&json.pin_required)return{pin_required:true};
      if(res.status===403)return{wrong_pin:true,attempts_remaining:json.attempts_remaining,locked:json.locked};
      if(res.status===429)return{locked:true,retry_minutes:json.retry_minutes};
      if(json.success===false)return{error:json.error||"Account not found"};
      if(!res.ok)return{error:"Server error"};
      if(json.success)return json;
      return null;
    }catch(e){return{error:"Connection failed"};}
  },
};
// ─── Device ID (persistent per device) ───
if(!LS.get("ft-device-id")){
  LS.set("ft-device-id","dev_"+Math.random().toString(36).slice(2,10)+Date.now().toString(36));
}

const todayStr=()=>new Date().toISOString().split("T")[0];
const nowStr=()=>{const d=new Date();return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");};
const fmtDate=(d)=>{if(!d)return"";try{const dt=new Date(d+"T12:00:00");const today=new Date();today.setHours(0,0,0,0);const diff=Math.round((dt-today)/86400000);if(diff===0)return"Today";if(diff===1)return"Tomorrow";if(diff===-1)return"Yesterday";if(diff>0&&diff<7)return dt.toLocaleDateString("en-US",{weekday:"short"});return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});}catch(e){return d;}};
const fmtFull=(d)=>{try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}catch(e){return d;}};
const isOverdue=(r)=>{if(r.done||!r.date)return false;return r.date<todayStr();};
const isToday=(r)=>r.date===todayStr();
const isTomorrow=(r)=>{const d=new Date();d.setDate(d.getDate()+1);return r.date===d.toISOString().split("T")[0];};
const daysFromNow=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];};
const overdueByDays=(r)=>{
  if(!isOverdue(r))return 0;
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((t-new Date(r.date+"T12:00:00"))/86400000);
};
const dueDiffDays=(r)=>{
  if(!r.date)return null;
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((new Date(r.date+"T12:00:00")-t)/86400000);
};

// ─── Natural Language Parser ───
function parseNaturalLanguage(text,lists){
  let title=text;
  let date=todayStr();
  let time="";
  let priority="medium";
  let list="personal";
  let tags=[];
  // Extract tags (#tag)
  const tagMatches=text.match(/#([a-zA-Z0-9\-]+)/g);
  if(tagMatches){tags=tagMatches.map(t=>t.slice(1).toLowerCase());title=title.replace(/#[a-zA-Z0-9\-]+/g,"").trim();}
  // Extract priority (!high, !low, !med)
  const priMatch=title.match(/!(high|medium|med|low)/i);
  if(priMatch){priority=priMatch[1].toLowerCase()==="med"?"medium":priMatch[1].toLowerCase();title=title.replace(/!(high|medium|med|low)/i,"").trim();}
  // Extract list (@listname)
  const listMatch=title.match(/@([a-zA-Z]+)/i);
  if(listMatch){const lname=listMatch[1].toLowerCase();const found=lists.find(l=>l.label.toLowerCase()===lname||l.id===lname);if(found)list=found.id;title=title.replace(/@[a-zA-Z]+/i,"").trim();}
  // Extract time (at HH:MM, at Hpm/am)
  const timeMatch=title.match(/\bat\s+(\d{1,2}):(\d{2})\s*(am|pm)?/i)||title.match(/\bat\s+(\d{1,2})\s*(am|pm)/i);
  if(timeMatch){let h=parseInt(timeMatch[1]);const m=timeMatch[2]&&timeMatch[2].length===2&&!isNaN(timeMatch[2])?parseInt(timeMatch[2]):0;const ampm=(timeMatch[3]||timeMatch[2]||"").toLowerCase();if(ampm==="pm"&&h<12)h+=12;if(ampm==="am"&&h===12)h=0;time=h.toString().padStart(2,"0")+":"+m.toString().padStart(2,"0");title=title.replace(/\bat\s+\d{1,2}(:\d{2})?\s*(am|pm)?/i,"").trim();}
  // Extract date keywords
  const lower=title.toLowerCase();
  if(lower.includes("tomorrow")){date=daysFromNow(1);title=title.replace(/\btomorrow\b/i,"").trim();}
  else if(lower.includes("today")){date=todayStr();title=title.replace(/\btoday\b/i,"").trim();}
  else if(lower.includes("next week")){date=daysFromNow(7);title=title.replace(/\bnext week\b/i,"").trim();}
  else if(lower.includes("next month")){date=daysFromNow(30);title=title.replace(/\bnext month\b/i,"").trim();}
  else{const dayNames=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];const found=dayNames.findIndex(d=>lower.includes(d));if(found>=0){const now=new Date();const cur=now.getDay();let diff=found-cur;if(diff<=0)diff+=7;const target=new Date();target.setDate(target.getDate()+diff);date=target.toISOString().split("T")[0];title=title.replace(new RegExp("\\b"+dayNames[found]+"\\b","i"),"").trim();}}
  title=title.replace(/\s+/g," ").trim();
  return{title:title||text,date,time,priority,list,tags};
}

// ─── .ics Calendar Export ───
function exportToICS(r){
  const start=r.date?(r.date.replace(/-/g,"")):"";
  const timeStr=r.time?("T"+r.time.replace(":","")+"00"):"";
  const dtStart=start+(timeStr||"");
  const dtEnd=dtStart;
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//ReminderLog//IRONLOG//EN","BEGIN:VEVENT","UID:"+r.id+"@reminderlog","DTSTART"+(r.time?"":";VALUE=DATE")+":"+dtStart,"DTEND"+(r.time?"":";VALUE=DATE")+":"+dtEnd,"SUMMARY:"+r.title,"DESCRIPTION:"+(r.notes||"").replace(/\n/g,"\\n"),"STATUS:CONFIRMED","END:VEVENT","END:VCALENDAR"].join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=(r.title.replace(/[^a-z0-9]/gi,"_"))+".ics";a.click();URL.revokeObjectURL(url);
}

// ─── Web Share ───
function shareReminder(r){
  const text=r.title+(r.date?" - "+fmtDate(r.date):"")+(r.time?" at "+r.time:"")+(r.notes?"\n"+r.notes:"");
  if(navigator.share){navigator.share({title:"ReminderLog",text}).catch(()=>{});}
  else{navigator.clipboard.writeText(text).then(()=>Toast.show("Copied to clipboard",V.accent)).catch(()=>{});}
}

// ─── Favicon Badge ───
function updateFaviconBadge(count){
  const canvas=document.createElement("canvas");canvas.width=32;canvas.height=32;
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#38bdf8";ctx.beginPath();ctx.arc(16,16,14,0,2*Math.PI);ctx.fill();
  ctx.fillStyle="#03090f";ctx.font="bold 18px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(count>99?"99+":count.toString(),16,17);
  const link=document.querySelector("link[rel='icon']")||document.createElement("link");
  link.type="image/x-icon";link.rel="icon";link.href=canvas.toDataURL();
  document.head.appendChild(link);
}

// ─── Achievement Badges ───
const ACHIEVEMENTS=[
  {id:"first_complete",icon:"🌟",name:"First Step",desc:"Complete your first reminder",check:(s)=>s.reminders.some(r=>r.done)},

// ─── Weekly Recap Calculator ───
function getWeeklyRecap(reminders){
  const now=new Date();const dayOfWeek=now.getDay();
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-(dayOfWeek===0?6:dayOfWeek-1));weekStart.setHours(0,0,0,0);
  const prevWeekStart=new Date(weekStart);prevWeekStart.setDate(prevWeekStart.getDate()-7);
  const weekStartStr=weekStart.toISOString().split("T")[0];
  const prevWeekStartStr=prevWeekStart.toISOString().split("T")[0];
  const thisWeekDone=reminders.filter(r=>r.done&&r.doneAt&&r.doneAt.slice(0,10)>=weekStartStr);
  const thisWeekAdded=reminders.filter(r=>r.createdAt&&r.createdAt.slice(0,10)>=weekStartStr);
  const prevWeekDone=reminders.filter(r=>r.done&&r.doneAt&&r.doneAt.slice(0,10)>=prevWeekStartStr&&r.doneAt.slice(0,10)<weekStartStr);
  const diff=thisWeekDone.length-prevWeekDone.length;
  return{completed:thisWeekDone.length,added:thisWeekAdded.length,prevCompleted:prevWeekDone.length,diff,weekStartStr};
}

// ─── XP Calculation ───
function calcScore(s){
  let xp=0;
  const reminders=s.reminders||[];
  xp+=reminders.filter(r=>r.done).length*8;
  const defaultIds=["personal","work","health","shopping","errands"];
  xp+=(s.lists||[]).filter(l=>!defaultIds.includes(l.id)).length*15;
  const doneByDay={};reminders.filter(r=>r.done&&r.doneAt).forEach(r=>{const d=r.doneAt.slice(0,10);doneByDay[d]=(doneByDay[d]||0)+1;});
  Object.values(doneByDay).forEach(n=>{if(n>=3)xp+=25;if(n>=5)xp+=25;});
  reminders.forEach(r=>{if(r.subtasks){xp+=r.subtasks.filter(st=>st.done).length*3;}});
  // Tags bonus: 2xp per unique tag ever used
  const allTagSet=new Set();reminders.forEach(r=>{(r.tags||[]).forEach(t=>allTagSet.add(t));});
  xp+=allTagSet.size*2;
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const nextRank=IRON_RANKS.find(r=>r.level===rank.level+1);
  const xpIntoRank=xp-rank.xpNeeded;
  const xpForNext=nextRank?(nextRank.xpNeeded-rank.xpNeeded):null;
  const pct=xpForNext?Math.min(100,Math.round(xpIntoRank/xpForNext*100)):100;
  const sortedDays=Object.keys(doneByDay).sort().reverse();
  let streak=0;
  const td=todayStr();
  let checkDate=new Date(td+"T12:00:00");
  for(let i=0;i<365;i++){
    const ds=checkDate.toISOString().split("T")[0];
    if(doneByDay[ds]){streak++;checkDate.setDate(checkDate.getDate()-1);}
    else if(ds===td){checkDate.setDate(checkDate.getDate()-1);}
    else break;
  }
  return{xp,rank,nextRank,xpIntoRank,xpForNext,pct,streak};
}

// ─── Notifications ───
/* FIX iOS-2: Guard every Notification reference — the global is absent in WKWebView / some iOS contexts */
const _hasNotif=typeof Notification!=="undefined";
const Notif={
  supported:()=>_hasNotif&&"Notification" in window,
  granted:()=>_hasNotif&&Notification.permission==="granted",
  request:async()=>{if(!Notif.supported())return false;try{const r=await Notification.requestPermission();return r==="granted";}catch(e){return false;}},
  schedule:(r)=>{
    if(!Notif.granted()||!r.date||!r.time)return;
    const dt=new Date(r.date+"T"+r.time+":00");
    const now=Date.now();
    const diff=dt.getTime()-now;
    if(diff<=0)return;
    const key="notif-"+r.id;
    const existing=parseInt(LS.get(key)||"0");
    if(existing)clearTimeout(existing);
    if(diff<86400000*7){
      const tid=setTimeout(()=>{
        if("serviceWorker" in navigator&&navigator.serviceWorker.controller){
          navigator.serviceWorker.ready.then(reg=>{
            reg.showNotification("ReminderLog",{body:r.title,icon:"./icon.svg",badge:"./icon.svg",tag:r.id,data:{id:r.id}});
          });
        } else if(_hasNotif){
          try{new Notification("ReminderLog",{body:r.title,icon:"./icon.svg",tag:r.id});}catch(e){}
        }
        LS.set(key,0);
      },diff);
      LS.set(key,tid);
    }
  },
  cancel:(id)=>{const key="notif-"+id;const tid=parseInt(LS.get(key)||"0");if(tid)clearTimeout(tid);LS.set(key,0);},
  scheduleAll:(reminders)=>{reminders.filter(r=>!r.done&&r.date&&r.time).forEach(r=>Notif.schedule(r));},
};

// ─── Level-Up Detection Hook ───
function useLevelUp(score,lsKey){
  const {rank}=score;
  const [celebrating,setCelebrating]=useState(false);
  const [celebRank,setCelebRank]=useState(null);
  useEffect(()=>{
    const saved=parseInt(LS.get(lsKey)||"1");
    if(rank.level>saved){
      LS.set(lsKey,rank.level);
      setCelebRank(rank);
      setTimeout(()=>setCelebrating(true),400);
    } else if(!LS.get(lsKey)){LS.set(lsKey,rank.level);}
  },[rank.level]);
  return{celebrating,celebRank,dismiss:()=>setCelebrating(false)};
}

// ─── Streak Heatmap (90-day) ───
function StreakHeatmap({reminders}){
  const data=useMemo(()=>{
    const map={};
    reminders.filter(r=>r.done&&r.doneAt).forEach(r=>{
      const d=r.doneAt.slice(0,10);map[d]=(map[d]||0)+1;
    });
    const days=[];
    for(let i=89;i>=0;i--){
      const dt=new Date();dt.setDate(dt.getDate()-i);
      const ds=dt.toISOString().split("T")[0];
      days.push({date:ds,count:map[ds]||0,day:dt.getDay()});
    }
    return days;
  },[reminders]);
  const maxCount=Math.max(1,...data.map(d=>d.count));
  const weeks=[];
  for(let i=0;i<data.length;i+=7)weeks.push(data.slice(i,i+7));
  return(
    <div style={{padding:16,borderRadius:14,background:V.card,border:"1px solid "+V.cardBorder}}>
      <div style={{fontSize:12,fontWeight:700,color:V.text,marginBottom:10}}>90-Day Activity</div>
      <div style={{display:"flex",gap:2,justifyContent:"center",flexWrap:"nowrap",overflowX:"auto"}}>
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:"flex",flexDirection:"column",gap:2}}>
            {week.map((d,di)=>{
              const intensity=d.count/maxCount;
              const bg=d.count===0?"rgba(255,255,255,0.04)":V.green+(Math.round(20+intensity*80).toString(16).padStart(2,"0"));
              return(
                <div key={di} title={d.date+": "+d.count+" completed"} style={{
                  width:10,height:10,borderRadius:2,background:bg,
                  border:d.date===todayStr()?"1px solid "+V.accent:"none",
                  cursor:"default",
                }}/>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:9,color:V.text3}}>
        <span>90 days ago</span>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <span>Less</span>
          {[0,0.25,0.5,0.75,1].map((v,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:1,background:v===0?"rgba(255,255,255,0.04)":V.green+(Math.round(20+v*80).toString(16).padStart(2,"0"))}}/>
          ))}
          <span>More</span>
        </div>
      </div>
    </div>
  );
}

// ─── Focus / Pomodoro Timer ───
function FocusMode({reminder,onClose,onComplete}){
  const [duration,setDuration]=useState(25);
  const [timeLeft,setTimeLeft]=useState(null);
  const [running,setRunning]=useState(false);
  const [completed,setCompleted]=useState(false);
  const intervalRef=useRef(null);
  const startTime=useRef(null);

  const start=()=>{
    setTimeLeft(duration*60);
    setRunning(true);
    startTime.current=Date.now();
  };

  useEffect(()=>{
    if(!running||timeLeft===null)return;
    if(timeLeft<=0){
      setRunning(false);
      setCompleted(true);
      Haptic.success();
      const sessions=(LS.get("rl-focus-sessions")||0)+1;
      LS.set("rl-focus-sessions",sessions);
      return;
    }
    intervalRef.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);
    return()=>clearTimeout(intervalRef.current);
  },[running,timeLeft]);

  const pause=()=>setRunning(false);
  const resume=()=>setRunning(true);
  const reset=()=>{setTimeLeft(null);setRunning(false);setCompleted(false);};

  const mins=timeLeft!==null?Math.floor(timeLeft/60):duration;
  const secs=timeLeft!==null?timeLeft%60:0;
  const pct=timeLeft!==null?Math.round(((duration*60-timeLeft)/(duration*60))*100):0;
  const radius=70;const circ=2*Math.PI*radius;const offset=circ-(pct/100)*circ;

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9996,background:"rgba(0,0,0,0.9)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,backdropFilter:"blur(8px)"}}>
      <button onClick={onClose} style={{position:"absolute",top:20,right:20,background:"none",border:"none",color:V.text3,cursor:"pointer",fontSize:24,padding:8}}>×</button>
      {reminder&&<div style={{fontSize:14,fontWeight:600,color:V.text2,marginBottom:24,textAlign:"center",maxWidth:280}}>{reminder.title}</div>}
      <div style={{position:"relative",marginBottom:32}}>
        <svg width={180} height={180} style={{transform:"rotate(-90deg)"}}>
          <circle cx={90} cy={90} r={radius} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={8}/>
          <circle cx={90} cy={90} r={radius} fill="none" stroke={completed?V.green:V.accent} strokeWidth={8}
            strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
            style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:42,fontWeight:900,color:completed?V.green:V.text,fontFamily:V.mono,letterSpacing:2,animation:running?"timerPulse 2s ease infinite":"none"}}>
            {mins.toString().padStart(2,"0")}:{secs.toString().padStart(2,"0")}
          </span>
          <span style={{fontSize:11,color:V.text3,marginTop:4}}>{completed?"Complete!":running?"Focusing...":"Ready"}</span>
        </div>
      </div>
      {!running&&timeLeft===null&&!completed&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:20,justifyContent:"center"}}>
            {[15,25,45,60].map(m=>(
              <button key={m} onClick={()=>setDuration(m)} style={{
                padding:"8px 16px",borderRadius:10,border:"1px solid "+(duration===m?V.accent:V.cardBorder),
                background:duration===m?V.accent+"15":"rgba(255,255,255,0.03)",
                color:duration===m?V.accent:V.text3,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:V.font
              }}>{m}m</button>
            ))}
          </div>
          <Btn full onClick={start}>Start Focus Session</Btn>
        </div>
      )}
      {running&&<Btn v="secondary" full onClick={pause} s={{maxWidth:200}}>Pause</Btn>}
      {!running&&timeLeft!==null&&!completed&&(
        <div style={{display:"flex",gap:10,width:"100%",maxWidth:300}}>
          <Btn v="secondary" full onClick={reset}>Reset</Btn>
          <Btn full onClick={resume}>Resume</Btn>
        </div>
      )}
      {completed&&(
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:V.green,marginBottom:8}}>+15 XP Focus Bonus!</div>
          {reminder&&<Btn full onClick={()=>{onComplete(reminder.id);onClose();}}>Complete Reminder</Btn>}
          <button onClick={onClose} style={{marginTop:12,background:"none",border:"none",color:V.text3,cursor:"pointer",fontSize:13,fontFamily:V.font}}>Close</button>
        </div>
      )}
    </div>,
    document.body
  );
}

// ─── ENHANCEMENT 4: DueBadge ───
function DueBadge({r}){
  if(r.done||!r.date)return null;
  const days=overdueByDays(r);
  const diff=dueDiffDays(r);
  let label,bg,color;
  if(days>0){
    label=days===1?"1d overdue":days+"d overdue";
    bg=V.danger+"20";color=V.danger;
  } else if(diff===0){
    label="Today";bg=V.warn+"22";color=V.warn;
  } else if(diff===1){
    label="Tomorrow";bg=V.accent+"15";color=V.accent;
  } else {
    return null;
  }
  return(
    <span className="badge-pop" style={{display:"inline-flex",alignItems:"center",gap:2,padding:"1px 7px",borderRadius:20,background:bg,border:"1px solid "+color+"30",fontSize:9,fontWeight:800,color,fontFamily:V.mono,letterSpacing:".03em",flexShrink:0}}>
      {days>0?"⚠ ":""}{label}
    </span>
  );
}

// ─── Reminder Row with Swipe + Long Press ───
function ReminderRow({r,lists,onToggle,onDelete,onEdit,onSnooze,onFocus,bulkMode,selected,onSelect}){
  const overdue=isOverdue(r);
  const listObj=lists.find(l=>l.id===r.list)||lists[0];
  const priObj=PRIORITIES.find(p=>p.id===r.priority)||PRIORITIES[1];
  const [swiped,setSwiped]=useState(0);
  const [ctxMenu,setCtxMenu]=useState(null);
  const touchRef=useRef({x:0,y:0,swiping:false});
  const longPressRef=useRef(null);
  const subtasksDone=r.subtasks?r.subtasks.filter(st=>st.done).length:0;
  const subtasksTotal=r.subtasks?r.subtasks.length:0;
  const tags=r.tags||[];

  const onTouchStart=(e)=>{
    if(bulkMode)return;
    touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY,swiping:false};
    longPressRef.current=setTimeout(()=>{
      Haptic.light();
      setCtxMenu({x:e.touches[0].clientX,y:e.touches[0].clientY});
    },500);
  };
  const onTouchMove=(e)=>{
    if(bulkMode)return;
    if(longPressRef.current)clearTimeout(longPressRef.current);
    const dx=e.touches[0].clientX-touchRef.current.x;
    const dy=e.touches[0].clientY-touchRef.current.y;
    if(!touchRef.current.swiping&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      touchRef.current.swiping=true;
    }
    if(touchRef.current.swiping){
      e.preventDefault();
      setSwiped(Math.max(-100,Math.min(100,dx)));
    }
  };
  const onTouchEnd=()=>{
    if(longPressRef.current)clearTimeout(longPressRef.current);
    if(bulkMode)return;
    if(swiped>60){
      Haptic.priority(r.priority);
      onToggle(r.id);Toast.show("Done! +8 XP",V.green);XPFloat.show(8);}
    else if(swiped<-60){
      const backup={...r};
      onDelete(r.id);
      UndoMgr.show("Reminder deleted",()=>{},V.danger);
    }
    setSwiped(0);
    touchRef.current.swiping=false;
  };

  const handleClick=()=>{
    if(bulkMode){if(onSelect)onSelect(r.id);return;}
    onEdit(r);
  };

  const ctxMenuItems=[
    {icon:"✅",label:r.done?"Undo Complete":"Complete",action:()=>onToggle(r.id)},
    ...(onEdit?[{icon:"✏️",label:"Edit",action:()=>onEdit(r)}]:[]),
    ...(onSnooze&&!r.done?[{icon:"⏰",label:"Snooze",action:()=>onSnooze(r)}]:[]),
    ...(onFocus&&!r.done?[{icon:"🎯",label:"Focus Mode",action:()=>onFocus(r)}]:[]),
    {icon:"📤",label:"Share",action:()=>shareReminder(r)},
    {icon:"📅",label:"Add to Calendar",action:()=>exportToICS(r)},
    {icon:"🗑️",label:"Delete",action:()=>onDelete(r.id),danger:true},
  ];

  const bgColor=swiped>30?V.green+"30":swiped<-30?V.danger+"30":"transparent";

  return(<>
    <div className="fade-up" style={{position:"relative",overflow:"hidden",borderRadius:8,background:bgColor,transition:swiped===0?"background .2s":"none"}}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      {swiped>20&&<div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:11,color:V.green,fontWeight:700}}>Complete</div>}
      {swiped<-20&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:11,color:V.danger,fontWeight:700}}>Delete</div>}
      <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 4px",borderBottom:"1px solid rgba(56,189,248,0.04)",opacity:r.done?.5:1,transition:"opacity .3s,transform .15s",transform:"translateX("+swiped+"px)"}}>
        {bulkMode?(
          <button onClick={()=>{if(onSelect)onSelect(r.id);}} style={{width:24,height:24,borderRadius:7,border:"2px solid "+(selected?V.accent:V.text3),background:selected?V.accent:"transparent",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {selected&&<svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="#03090f" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
          </button>
        ):(

function sortReminders(arr,sort){
  if(!sort)return arr;
  const priOrder={high:0,medium:1,low:2};
  return[...arr].sort((a,b)=>{
    if(sort==="date")return(a.date||"9").localeCompare(b.date||"9");
    if(sort==="priority")return(priOrder[a.priority]||1)-(priOrder[b.priority]||1);
    if(sort==="name")return a.title.localeCompare(b.title);
    if(sort==="created")return(b.createdAt||"").localeCompare(a.createdAt||"");
    return 0;
  });
}

// ─── State ───
const init={tab:"today",reminders:[],lists:[...DEFAULT_LISTS],loaded:false};
function reducer(s,a){
  switch(a.type){
    case "INIT":return{...s,...a.p,loaded:true};
    case "TAB":return{...s,tab:a.tab};
    case "ADD":return{...s,reminders:[a.r,...s.reminders]};
    case "UPDATE":return{...s,reminders:s.reminders.map(r=>r.id===a.r.id?a.r:r)};
    case "RESTORE":return{...s,reminders:[a.r,...s.reminders]};
    case "TOGGLE":{
      const r=s.reminders.find(x=>x.id===a.id);
      if(!r)return s;
      const done=!r.done;
      let updated={...r,done,doneAt:done?new Date().toISOString():null};
      if(done&&r.recur&&r.recur!=="none"&&r.date){
        const dt=new Date(r.date+"T12:00:00");
        if(r.recur==="daily")dt.setDate(dt.getDate()+1);
        else if(r.recur==="weekly")dt.setDate(dt.getDate()+7);
        else if(r.recur==="monthly")dt.setMonth(dt.getMonth()+1);
        const nextDate=dt.toISOString().split("T")[0];
        const next={...r,id:uid(),date:nextDate,done:false,doneAt:null,createdAt:new Date().toISOString()};
        return{...s,reminders:[next,...s.reminders.map(x=>x.id===a.id?updated:x)]};
      }
      return{...s,reminders:s.reminders.map(x=>x.id===a.id?updated:x)};
    }
    case "SNOOZE":{
      return{...s,reminders:s.reminders.map(r=>r.id===a.id?{...r,date:a.date,time:a.time||r.time}:r)};
    }
    case "DELETE":return{...s,reminders:s.reminders.filter(r=>r.id!==a.id)};
    case "BULK_DELETE":return{...s,reminders:s.reminders.filter(r=>!a.ids.includes(r.id))};
    case "BULK_COMPLETE":return{...s,reminders:s.reminders.map(r=>a.ids.includes(r.id)?{...r,done:true,doneAt:new Date().toISOString()}:r)};
    case "BULK_MOVE":return{...s,reminders:s.reminders.map(r=>a.ids.includes(r.id)?{...r,list:a.list}:r)};
    case "ADD_LIST":return{...s,lists:[...s.lists,a.list]};
    case "DEL_LIST":return{...s,lists:s.lists.filter(l=>l.id!==a.id),reminders:s.reminders.filter(r=>r.list!==a.id)};
    case "IMPORT":return{...s,...a.data};
    default:return s;
  }
}

// ─── Calendar View ───
function CalendarView({reminders,onDateClick}){
  const [month,setMonth]=useState(()=>{const now=new Date();return{year:now.getFullYear(),month:now.getMonth()};});
  const daysInMonth=new Date(month.year,month.month+1,0).getDate();
  const firstDay=new Date(month.year,month.month,1).getDay();
  const days=[];
  for(let i=0;i<firstDay;i++)days.push(null);
  for(let i=1;i<=daysInMonth;i++)days.push(i);
  const monthName=new Date(month.year,month.month,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const today=todayStr();
  const prev=()=>{setMonth(m=>m.month===0?{year:m.year-1,month:11}:{...m,month:m.month-1});};
  const next=()=>{setMonth(m=>m.month===11?{year:m.year+1,month:0}:{...m,month:m.month+1});};

  const remindersByDate=useMemo(()=>{
    const map={};
    reminders.filter(r=>!r.done).forEach(r=>{
      if(r.date){if(!map[r.date])map[r.date]=[];map[r.date].push(r);}
    });
    return map;
  },[reminders]);

  return(
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={prev} style={{background:"none",border:"none",cursor:"pointer",padding:8,color:V.accent,fontSize:16}}>◀</button>
        <span style={{fontSize:14,fontWeight:700,color:V.text}}>{monthName}</span>
        <button onClick={next} style={{background:"none",border:"none",cursor:"pointer",padding:8,color:V.accent,fontSize:16}}>▶</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {["S","M","T","W","T","F","S"].map((d,i)=>(
          <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:V.text3,padding:"4px 0"}}>{d}</div>
        ))}
        {days.map((day,i)=>{
          if(!day)return<div key={i}/>;
          const dateStr=month.year+"-"+String(month.month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
          const count=(remindersByDate[dateStr]||[]).length;
          const isT=dateStr===today;
          return(
            <button key={i} onClick={()=>onDateClick(dateStr)} style={{
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              padding:"6px 2px",borderRadius:8,border:isT?"2px solid "+V.accent:"2px solid transparent",
              background:count>0?V.accent+"10":"transparent",cursor:"pointer",minHeight:36
            }}>
              <span style={{fontSize:12,fontWeight:isT?800:500,color:isT?V.accent:V.text}}>{day}</span>
              {count>0&&(
                <div style={{display:"flex",gap:1,marginTop:2}}>
                  {Array.from({length:Math.min(count,3)}).map((_,j)=>(
                    <div key={j} style={{width:4,height:4,borderRadius:2,background:V.accent}}/>
                  ))}
                </div>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function StatsTab({s}){

  const active=reminders.filter(r=>!r.done);
  const total=reminders.length;
  const completionRate=total>0?Math.round(done.length/total*100):0;

  const chartData=useMemo(()=>{
    const data=[];
    for(let i=13;i>=0;i--){
      const dt=new Date();dt.setDate(dt.getDate()-i);
      const ds=dt.toISOString().split("T")[0];
      const label=dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      const completed=done.filter(r=>r.doneAt&&r.doneAt.startsWith(ds)).length;
      const added=reminders.filter(r=>r.createdAt&&r.createdAt.startsWith(ds)).length;
      data.push({name:label,completed,added});

/* FIX 7: Accept onThemeChange prop so App can re-render after theme switch */
function SettingsSheet({s,d,onClose,onThemeChange}){
  const [notifPerm,setNotifPerm]=useState(()=>Notif.supported()?(typeof Notification!=="undefined"?Notification.permission:"denied"):"unsupported");
  const fileRef=useRef(null);

  const requestNotifs=async()=>{
    const granted=await Notif.request();
    setNotifPerm(granted?"granted":"denied");
    if(granted){Notif.scheduleAll(s.reminders);Toast.show("Notifications enabled",V.green);}
  };

  const exportData=()=>{
    const data=JSON.stringify({reminders:s.reminders,lists:s.lists,exportDate:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="reminderlog-backup-"+todayStr()+".json";
    a.click();URL.revokeObjectURL(url);
    Toast.show("Exported!",V.green);
  };

  const importData=(e)=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(evt)=>{
      try{
        const data=JSON.parse(evt.target.result);
        if(data.reminders&&data.lists){
          Confirm.show("Import data?","This will replace all current reminders and lists.",()=>{
            d({type:"IMPORT",data:{reminders:data.reminders,lists:data.lists}});
            Toast.show("Imported!",V.green);
          });
        }else{Toast.show("Invalid file",V.danger);}
      }catch(err){Toast.show("Invalid JSON",V.danger);}
    };
    reader.readAsText(file);
  };

  const clearAll=()=>{
    Confirm.show("Clear all data?","This will permanently delete all reminders, lists, and settings. This cannot be undone.",()=>{
      LS.set("rl-reminders",[]);

// ─── TODAY TAB ───
function TodayTab({s,d,score,missions}){
  const[showEdit,setShowEdit]=useState(null);
  const[sort,setSort]=useState(null);
  const[snoozeTarget,setSnoozeTarget]=useState(null);
  const[bulkMode,setBulkMode]=useState(false);
  const[selected,setSelected]=useState(new Set());
  const[activeTag,setActiveTag]=useState(null);
  const[focusTarget,setFocusTarget]=useState(null);
  const today=todayStr();
  const allTags=useMemo(()=>{const set=new Set();s.reminders.filter(r=>!r.done).forEach(r=>(r.tags||[]).forEach(t=>set.add(t)));return[...set].sort();},[s.reminders]);
  let overdueItems=sortReminders(s.reminders.filter(r=>!r.done&&isOverdue(r)),sort||"date");
  let todayItems=sortReminders(s.reminders.filter(r=>!r.done&&r.date===today),sort||"priority");
  if(activeTag){overdueItems=overdueItems.filter(r=>(r.tags||[]).includes(activeTag));todayItems=todayItems.filter(r=>(r.tags||[]).includes(activeTag));}
  const doneToday=s.reminders.filter(r=>r.done&&r.doneAt&&r.doneAt.startsWith(today));
  const totalRing=todayItems.length+doneToday.length;
  const completedPct=totalRing>0?Math.round(doneToday.length/totalRing*100):0;
  const toggleSelect=(id)=>{const n=new Set(selected);if(n.has(id))n.delete(id);else n.add(id);setSelected(n);};
  const bulkComplete=()=>{if(!selected.size)return;d({type:"BULK_COMPLETE",ids:[...selected]});Toast.show(selected.size+" completed",V.green);XPFloat.show(selected.size*8);setBulkMode(false);setSelected(new Set());};
  const bulkDelete=()=>{if(!selected.size)return;Confirm.show("Delete "+selected.size+" reminders?","",()=>{d({type:"BULK_DELETE",ids:[...selected]});Toast.show(selected.size+" deleted",V.danger);setBulkMode(false);setSelected(new Set());});};
  const mkDelete=(id)=>{const bk=s.reminders.find(x=>x.id===id);d({type:"DELETE",id});if(bk)UndoMgr.show("Deleted",()=>d({type:"RESTORE",r:bk}),V.danger);};
  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <TodayHeroCard score={score} doneCount={doneToday.length} totalCount={totalRing} overdueCount={overdueItems.length}/>
      <WeeklyRecapCard reminders={s.reminders} score={score}/>
      <MissionsPanel missions={missions}/>
      <QuickAdd lists={s.lists} onAdd={(r)=>d({type:"ADD",r})}/>
      {allTags.length>0&&<TagFilterBar allTags={allTags} activeTag={activeTag} setActiveTag={setActiveTag}/>}
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <SortSelector sort={sort} setSort={setSort}/>
        <button onClick={()=>{setBulkMode(!bulkMode);setSelected(new Set());}} style={{marginLeft:"auto",padding:"4px 10px",borderRadius:12,border:"none",fontSize:10,fontWeight:600,fontFamily:V.font,cursor:"pointer",background:bulkMode?V.accent+"15":"rgba(255,255,255,0.03)",color:bulkMode?V.accent:V.text3}}>{bulkMode?"Cancel":"Select"}</button>
      </div>
      {bulkMode&&selected.size>0&&(<div style={{display:"flex",gap:6}}><Btn v="small" s={{flex:1}} onClick={bulkComplete}>Complete ({selected.size})</Btn><Btn v="danger" s={{flex:1,minHeight:36,fontSize:12,borderRadius:10,padding:"8px 14px"}} onClick={bulkDelete}>Delete ({selected.size})</Btn></div>)}
      {totalRing>0&&(
        <div style={{padding:"10px 14px",borderRadius:12,background:V.accent+"06",border:"1px solid "+V.accent+"15"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:V.text2,fontWeight:600}}>Today's progress</span><span style={{fontSize:11,color:V.accent,fontWeight:700,fontFamily:V.mono}}>{doneToday.length}/{totalRing}</span></div>
          <div style={{width:"100%",height:5,borderRadius:3,background:"rgba(255,255,255,0.05)"}}><div style={{height:"100%",borderRadius:3,width:completedPct+"%",background:"linear-gradient(90deg,"+V.accent+","+V.accent2+")",transition:"width .6s ease"}}/></div>
        </div>
      )}
      {overdueItems.length>0&&(<div><div style={{fontSize:10,fontWeight:700,color:V.danger,letterSpacing:".06em",marginBottom:4}}>⚠️ OVERDUE ({overdueItems.length})</div>{overdueItems.map(r=><ReminderRow key={r.id} r={r} lists={s.lists} onToggle={(id)=>{d({type:"TOGGLE",id});XPFloat.show(8);}} onDelete={mkDelete} onEdit={(r)=>setShowEdit(r)} onSnooze={(r)=>setSnoozeTarget(r)} onFocus={(r)=>setFocusTarget(r)} bulkMode={bulkMode} selected={selected.has(r.id)} onSelect={toggleSelect}/>)}</div>)}
      {todayItems.length>0&&(<div><div style={{fontSize:10,fontWeight:700,color:V.text3,letterSpacing:".06em",marginBottom:4}}>TODAY ({todayItems.length})</div>{todayItems.map(r=><ReminderRow key={r.id} r={r} lists={s.lists} onToggle={(id)=>{d({type:"TOGGLE",id});XPFloat.show(8);}} onDelete={mkDelete} onEdit={(r)=>setShowEdit(r)} onSnooze={(r)=>setSnoozeTarget(r)} onFocus={(r)=>setFocusTarget(r)} bulkMode={bulkMode} selected={selected.has(r.id)} onSelect={toggleSelect}/>)}</div>)}
      {doneToday.length>0&&(<div style={{opacity:.55}}><div style={{fontSize:10,fontWeight:700,color:V.text3,letterSpacing:".06em",marginBottom:4}}>COMPLETED ({doneToday.length})</div>{doneToday.map(r=><ReminderRow key={r.id} r={r} lists={s.lists} onToggle={(id)=>d({type:"TOGGLE",id})} onDelete={(id)=>d({type:"DELETE",id})} onEdit={(r)=>setShowEdit(r)}/>)}</div>)}
      {overdueItems.length===0&&todayItems.length===0&&doneToday.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:V.text3}}>
          <div style={{fontSize:48,marginBottom:12}}>✨</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>All clear!</div>
          <div style={{fontSize:13,marginBottom:16}}>Nothing due today — start fresh by adding a reminder above</div>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <Btn v="small" onClick={()=>setShowEdit({})}>+ New Reminder</Btn>
          </div>
        </div>
      )}
      {showEdit&&<EditSheet r={showEdit.id?showEdit:null} lists={s.lists} onSave={(u)=>{d({type:u.id&&s.reminders.find(x=>x.id===u.id)?"UPDATE":"ADD",r:u});Toast.show(u.id&&s.reminders.find(x=>x.id===u.id)?"Updated":"Added",V.accent);}} onClose={()=>setShowEdit(null)}/>}
      {snoozeTarget&&<SnoozeMenu onSnooze={(date,time)=>{d({type:"SNOOZE",id:snoozeTarget.id,date,time});Toast.show("Snoozed → "+fmtDate(date),V.accent);}} onClose={()=>setSnoozeTarget(null)}/>}
      {focusTarget&&<FocusMode reminder={focusTarget} onClose={()=>setFocusTarget(null)} onComplete={(id)=>{d({type:"TOGGLE",id});Toast.show("Done! +23 XP (8+15 focus)",V.green);XPFloat.show(23);}}/>}
    </div>
  );
}

// ─── UPCOMING TAB ───
function UpcomingTab({s,d}){
  const [showEdit,setShowEdit]=useState(null);
  const [filterList,setFilterList]=useState("all");
  const [sort,setSort]=useState(null);
  const [viewMode,setViewMode]=useState("list");
  const [snoozeTarget,setSnoozeTarget]=useState(null);
  const [selectedDate,setSelectedDate]=useState(null);
  const [focusTarget,setFocusTarget]=useState(null);
  const today=todayStr();

  let upcoming=s.reminders.filter(r=>!r.done&&r.date>today).filter(r=>filterList==="all"||r.list===filterList);
  if(selectedDate)upcoming=upcoming.filter(r=>r.date===selectedDate);
  upcoming=sortReminders(upcoming,sort||"date");
  const noDate=s.reminders.filter(r=>!r.done&&!r.date).filter(r=>filterList==="all"||r.list===filterList);

  /* FIX 8: useMemo now depends on stable values, not array reference of `upcoming` */
  const grouped=useMemo(()=>{
    const base=s.reminders.filter(r=>!r.done&&r.date>today).filter(r=>filterList==="all"||r.list===filterList);
    const filtered=selectedDate?base.filter(r=>r.date===selectedDate):base;
    const sorted=sortReminders(filtered,sort||"date");
    const map={};
    sorted.forEach(r=>{const key=r.date||"no-date";if(!map[key])map[key]=[];map[key].push(r);});
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  },[s.reminders,filterList,selectedDate,sort,today]);

  const makeDeleteHandler=(id)=>{
    const backup=s.reminders.find(x=>x.id===id);
    d({type:"DELETE",id});
    if(backup)UndoMgr.show("Deleted",()=>d({type:"RESTORE",r:backup}),V.danger);
  };

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <QuickAdd lists={s.lists} onAdd={(r)=>d({type:"ADD",r})}/>

      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={()=>{setViewMode("list");setSelectedDate(null);}} style={{padding:"5px 12px",borderRadius:10,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:V.font,background:viewMode==="list"?V.accent+"15":"rgba(255,255,255,0.03)",color:viewMode==="list"?V.accent:V.text3}}>List</button>
        <button onClick={()=>setViewMode("calendar")} style={{padding:"5px 12px",borderRadius:10,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:V.font,background:viewMode==="calendar"?V.accent+"15":"rgba(255,255,255,0.03)",color:viewMode==="calendar"?V.accent:V.text3}}>Calendar</button>
        <div style={{flex:1}}/>
        <SortSelector sort={sort} setSort={setSort}/>
      </div>

      <div style={{display:"flex",gap:5,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:2}}>
        <button onClick={()=>setFilterList("all")} style={{padding:"6px 12px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,fontFamily:V.font,cursor:"pointer",background:filterList==="all"?V.accent+"15":"rgba(255,255,255,0.04)",color:filterList==="all"?V.accent:V.text3,whiteSpace:"nowrap"}}>All</button>
        {s.lists.map(l=>(
          <button key={l.id} onClick={()=>setFilterList(filterList===l.id?"all":l.id)} style={{padding:"6px 12px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,fontFamily:V.font,cursor:"pointer",background:filterList===l.id?l.color+"15":"rgba(255,255,255,0.04)",color:filterList===l.id?l.color:V.text3,whiteSpace:"nowrap"}}>
            {l.icon} {l.label}
          </button>
        ))}
      </div>

      {viewMode==="calendar"&&(
        <CalendarView reminders={s.reminders} onDateClick={(dateStr)=>setSelectedDate(selectedDate===dateStr?null:dateStr)}/>
      )}
      {selectedDate&&<div style={{fontSize:11,color:V.accent,fontWeight:600}}>Showing: {fmtFull(selectedDate)} <button onClick={()=>setSelectedDate(null)} style={{background:"none",border:"none",color:V.text3,cursor:"pointer",fontSize:11,fontFamily:V.font}}>Clear</button></div>}

      {grouped.map(([date,items])=>(
        <div key={date}>
          <div style={{fontSize:10,fontWeight:700,color:V.accent2,letterSpacing:".06em",marginBottom:4,textTransform:"uppercase"}}>{fmtFull(date)}</div>
          {items.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
            onToggle={(id)=>{d({type:"TOGGLE",id});Haptic.success();XPFloat.show(8);}}
            onDelete={makeDeleteHandler}
            onEdit={(r)=>setShowEdit(r)}
            onSnooze={(r)=>setSnoozeTarget(r)}
            onFocus={(r)=>setFocusTarget(r)}/>)}
        </div>
      ))}

      {noDate.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,letterSpacing:".06em",marginBottom:4}}>SOMEDAY</div>
          {noDate.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
            onToggle={(id)=>{d({type:"TOGGLE",id});Haptic.success();XPFloat.show(8);}}
            onDelete={makeDeleteHandler}
            onEdit={(r)=>setShowEdit(r)}
            onSnooze={(r)=>setSnoozeTarget(r)}
            onFocus={(r)=>setFocusTarget(r)}/>)}
        </div>
      )}

      {grouped.length===0&&noDate.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:V.text3}}>
          <div style={{fontSize:48,marginBottom:12}}>📅</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>Nothing upcoming</div>
          <div style={{fontSize:13,marginBottom:16}}>Reminders with future dates will appear here</div>
          <Btn v="small" onClick={()=>setShowEdit({})}>+ Schedule a Reminder</Btn>
        </div>
      )}

      {showEdit&&<EditSheet r={showEdit.id?showEdit:null} lists={s.lists} onSave={(u)=>{d({type:u.id&&s.reminders.find(x=>x.id===u.id)?"UPDATE":"ADD",r:u});Toast.show(u.id&&s.reminders.find(x=>x.id===u.id)?"Updated":"Added",V.accent);}} onClose={()=>setShowEdit(null)}/>}
      {snoozeTarget&&<SnoozeMenu onSnooze={(date,time)=>{d({type:"SNOOZE",id:snoozeTarget.id,date,time});Toast.show("Snoozed to "+fmtDate(date),V.accent);}} onClose={()=>setSnoozeTarget(null)}/>}
      {focusTarget&&<FocusMode reminder={focusTarget} onClose={()=>setFocusTarget(null)} onComplete={(id)=>{d({type:"TOGGLE",id});Toast.show("Done! +23 XP",V.green);XPFloat.show(23);}}/>}
    </div>
  );
}

// ─── LISTS TAB ───
function ListsTab({s,d}){
  const [showEdit,setShowEdit]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [newList,setNewList]=useState({label:"",icon:"📝",color:V.accent});
  const LIST_COLORS=[V.accent,"#60a5fa","#a78bfa","#f472b6","#34d399","#fbbf24","#f87171","#fb923c"];
  const LIST_ICONS=["📝","💼","🏠","🛒","💊","🎯","📚","✈️","🎮","💪","🍔","🎵","🌱","🐾","🔧"];

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:10}}>
      {s.lists.map(list=>{
        const count=s.reminders.filter(r=>r.list===list.id&&!r.done).length;
        const done=s.reminders.filter(r=>r.list===list.id&&r.done).length;
        return(
          <div key={list.id} onClick={()=>setShowEdit({list,items:s.reminders.filter(r=>r.list===list.id)})} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:14,background:V.card,border:"1px solid "+V.cardBorder,cursor:"pointer"}}>
            <div style={{width:40,height:40,borderRadius:12,background:list.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{list.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:V.text}}>{list.label}</div>
              <div style={{fontSize:11,color:V.text3}}>{count} remaining · {done} done</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {count>0&&<div style={{minWidth:22,height:22,borderRadius:11,background:list.color+"20",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 6px"}}><span style={{fontSize:11,fontWeight:800,color:list.color,fontFamily:V.mono}}>{count}</span></div>}
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>
        );
      })}

      <Btn v="secondary" full onClick={()=>setShowNew(true)}>+ New List</Btn>

      {showNew&&(
        <Sheet title="New List" onClose={()=>setShowNew(false)} footer={<Btn full onClick={()=>{if(!newList.label.trim())return;d({type:"ADD_LIST",list:{id:uid(),...newList}});Toast.show("List created",V.accent);setShowNew(false);setNewList({label:"",icon:"📝",color:V.accent});}}>Create List</Btn>}>
          <Field label="List Name" value={newList.label} onChange={v=>setNewList(l=>({...l,label:v}))} placeholder="e.g. Weekend plans" autoFocus/>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Icon</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {LIST_ICONS.map(ico=>(
                <button key={ico} onClick={()=>setNewList(l=>({...l,icon:ico}))} style={{width:38,height:38,borderRadius:10,border:"2px solid "+(newList.icon===ico?V.accent:V.cardBorder),background:newList.icon===ico?V.accent+"15":"rgba(255,255,255,0.03)",fontSize:18,cursor:"pointer"}}>{ico}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Color</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {LIST_COLORS.map(c=>(
                <button key={c} onClick={()=>setNewList(l=>({...l,color:c}))} style={{width:32,height:32,borderRadius:8,background:c,border:"2px solid "+(newList.color===c?"#fff":"transparent"),cursor:"pointer"}}/>
              ))}
            </div>
          </div>
        </Sheet>
      )}

      {showEdit&&(
        <Sheet title={showEdit.list.label} onClose={()=>setShowEdit(null)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:13,color:V.text3}}>{showEdit.items.filter(r=>!r.done).length} remaining</div>
            {!DEFAULT_LISTS.find(l=>l.id===showEdit.list.id)&&(
              <Btn v="danger" s={{minHeight:32,padding:"6px 14px",fontSize:12}} onClick={()=>{Confirm.show("Delete \""+showEdit.list.label+"\"?","All reminders in this list will also be deleted.",()=>{d({type:"DEL_LIST",id:showEdit.list.id});setShowEdit(null);});}}>Delete List</Btn>
            )}
          </div>
          {showEdit.items.filter(r=>!r.done).map(r=>(
            <ReminderRow key={r.id} r={r} lists={s.lists}
              onToggle={(id)=>{d({type:"TOGGLE",id});Toast.show("Done!",V.green);}}
              onDelete={(id)=>d({type:"DELETE",id})} onEdit={()=>{}}/>
          ))}
          {showEdit.items.filter(r=>r.done).length>0&&(
            <div style={{marginTop:12,opacity:.5}}>
              <div style={{fontSize:10,color:V.text3,fontWeight:600,marginBottom:4}}>COMPLETED</div>
              {showEdit.items.filter(r=>r.done).slice(0,5).map(r=>(
                <ReminderRow key={r.id} r={r} lists={s.lists}
                  onToggle={(id)=>d({type:"TOGGLE",id})}
                  onDelete={(id)=>d({type:"DELETE",id})} onEdit={()=>{}}/>
              ))}
            </div>
          )}
        </Sheet>
      )}
    </div>
  );
}

// ─── DONE TAB ───
function DoneTab({s,d}){
  const done=s.reminders.filter(r=>r.done).sort((a,b)=>(b.doneAt||"").localeCompare(a.doneAt||""));
  const clearAll=()=>Confirm.show("Clear completed?","All completed reminders will be permanently deleted.",()=>{done.forEach(r=>d({type:"DELETE",id:r.id}));Toast.show("Cleared",V.accent);});
  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:4}}>
      {done.length>0&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:12,color:V.text3}}>{done.length} completed</div>
          <Btn v="danger" s={{minHeight:32,padding:"6px 14px",fontSize:12}} onClick={clearAll}>Clear All</Btn>
        </div>
      )}
      {done.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
        onToggle={(id)=>d({type:"TOGGLE",id})}
        onDelete={(id)=>d({type:"DELETE",id})}
        onEdit={()=>{}}/>)}
      {done.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:V.text3}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>No completed reminders</div><div style={{fontSize:13,marginBottom:16}}>Complete a reminder and it will show up here</div><div style={{fontSize:11,color:V.text3}}>Tip: Swipe right on any reminder to complete it</div></div>}
    </div>
  );
}

// ─── APP ───
function App(){
  const [s,d]=useReducer(reducer,init);
  const [showSearch,setShowSearch]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(()=>!LS.get("rl-onboarded"));
  const [showAchievements,setShowAchievements]=useState(false);
  const [showTemplates,setShowTemplates]=useState(false);
  const [showConfetti,setShowConfetti]=useState(false);
  const [,setThemeKey]=useState(0);
  const handleThemeChange=useCallback(()=>setThemeKey(k=>k+1),[]);
  const lastStreakRef=useRef(LS.get("rl-last-streak")||0);

  const score=useMemo(()=>calcScore(s),[s.reminders,s.lists]);
  const missions=useMemo(()=>getDailyMissions(s),[s.reminders,s.lists]);
  const {celebrating,celebRank,dismiss:dismissLevel}=useLevelUp(score,"rl-last-level");

  // Streak milestone confetti
  useEffect(()=>{
    const milestones=[7,14,30,60,100,200,365];
    if(milestones.includes(score.streak)&&score.streak>lastStreakRef.current){
      setShowConfetti(true);
      Haptic.streakMilestone();
      Toast.show("🎉 "+score.streak+"-day streak milestone!",V.warn);
    }
    lastStreakRef.current=score.streak;
    LS.set("rl-last-streak",score.streak);
  },[score.streak]);

  // Achievement unlock detection
  useEffect(()=>{
    if(!s.loaded)return;
    const unlocked=getUnlockedAchievements(s,score);
    const prev=LS.get("rl-achievements-count")||0;
    if(unlocked.length>prev){
      const newBadge=unlocked[unlocked.length-1];
      Toast.show("🏆 Badge unlocked: "+newBadge.name,V.accent);
      LS.set("rl-achievements-count",unlocked.length);
    }
  },[s.reminders,s.lists,score]);

  // Favicon badge + document title
  useEffect(()=>{
    if(!s.loaded)return;
    const active=s.reminders.filter(r=>!r.done&&(isOverdue(r)||r.date===todayStr())).length;
    if(active>0){
      document.title="("+active+") ReminderLog";
      updateFaviconBadge(active);
    }else{
      document.title="ReminderLog";
    }
  },[s.reminders,s.loaded]);

  // Keyboard shortcuts
  useEffect(()=>{
    const handler=(e)=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.contentEditable==="true")return;
      if(e.key==="/"||e.key==="f"&&(e.metaKey||e.ctrlKey)){e.preventDefault();setShowSearch(true);}
      else if(e.key==="n"||e.key==="N"){setShowSearch(false);/* QuickAdd auto-focuses */}
      else if(e.key==="1")d({type:"TAB",tab:"today"});
      else if(e.key==="2")d({type:"TAB",tab:"upcoming"});
      else if(e.key==="3")d({type:"TAB",tab:"lists"});
      else if(e.key==="4")d({type:"TAB",tab:"stats"});
      else if(e.key==="5")d({type:"TAB",tab:"done"});
      else if(e.key==="t"||e.key==="T")setShowTemplates(true);
      else if(e.key==="a"||e.key==="A")setShowAchievements(true);
      else if(e.key==="Escape"){setShowSearch(false);setShowSettings(false);setShowAchievements(false);setShowTemplates(false);}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  useEffect(()=>{
    (async()=>{
      try{
        const reminders=LS.get("rl-reminders")||[];
        const lists=LS.get("rl-lists")||DEFAULT_LISTS;
        const migrated=reminders.map(r=>({...r,subtasks:r.subtasks||[],tags:r.tags||[]}));
        // ── SSO: try silent login from IronLog session ──
        if(!LS.get("ft-session-token")){
          const ssoToken=Cookie.get("ironlog_session");
          if(ssoToken){
            try{
              const vRes=await fetch(`${SYNC_URL}/api/auth/session`,{method:"POST",
                headers:{"Content-Type":"application/json","X-Session-Token":ssoToken},
                body:JSON.stringify({action:"validate"})});
              const vJson=await vRes.json();
              if(vJson.valid&&vJson.email){
                const deviceId=LS.get("ft-device-id")||uid();
                LS.set("ft-device-id",deviceId);
                LS.set("ft-session-token",ssoToken);
                LS.set("ft-session-email",vJson.email);
                const pull=await CloudSync.pull(vJson.email,deviceId,null);
                if(pull?.success&&pull?.data?.profile){
                  LS.set("ft-profile",pull.data.profile);
                }
              }
            }catch(e){/* SSO failed silently */}
          }
        }
        d({type:"INIT",p:{reminders:migrated,lists}});
        if(Notif.granted())Notif.scheduleAll(migrated);
      }catch(e){
        d({type:"INIT",p:{reminders:[],lists:DEFAULT_LISTS}});
      }
    })();
  },[]);

  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("rl-reminders",s.reminders);
    LS.set("rl-lists",s.lists);
  },[s.reminders,s.lists,s.loaded]);

  if(!s.loaded)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:V.bg,flexDirection:"column",gap:12}}>
      <div style={{fontSize:36}}>🔔</div>
      <div style={{fontSize:11,color:V.text3,fontFamily:V.mono,animation:"pulse 1.5s infinite"}}>Loading...</div>
    </div>
  );

  const overdueCount=s.reminders.filter(r=>!r.done&&isOverdue(r)).length;
  const todayCount=s.reminders.filter(r=>!r.done&&r.date===todayStr()).length;
  const tabs=[
    {id:"today",label:"Today",icon:"🏠",badge:overdueCount>0?overdueCount:todayCount>0?todayCount:0,badgeColor:overdueCount>0?V.danger:V.accent},
    {id:"upcoming",label:"Upcoming",icon:"📅",badge:0},
    {id:"lists",label:"Lists",icon:"📋",badge:0},
    {id:"stats",label:"Stats",icon:"📊",badge:0},
    {id:"done",label:"Done",icon:"✅",badge:0},
  ];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:V.bg}}>
      <div style={{paddingTop:"max(16px,env(safe-area-inset-top,0px))",paddingLeft:16,paddingRight:16,paddingBottom:10,background:V.navBg,borderBottom:"1px solid "+V.cardBorder,flexShrink:0,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:22}}>🔔</span>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:V.text,lineHeight:1}}>ReminderLog</div>
              <div style={{fontSize:9,color:V.text3,fontWeight:600,letterSpacing:".1em"}}>by IRONLOG</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            {overdueCount>0&&<div style={{padding:"4px 10px",borderRadius:20,background:V.danger+"20",border:"1px solid "+V.danger+"30"}}><span style={{fontSize:11,fontWeight:800,color:V.danger}}>{overdueCount} overdue</span></div>}
            <button onClick={()=>setShowAchievements(true)} style={{background:"none",border:"none",cursor:"pointer",padding:6,display:"flex",alignItems:"center",fontSize:16}}>🏆</button>
            <button onClick={()=>setShowTemplates(true)} style={{background:"none",border:"none",cursor:"pointer",padding:6,display:"flex",alignItems:"center",fontSize:16}}>📄</button>
            <button onClick={()=>setShowSearch(true)} style={{background:"none",border:"none",cursor:"pointer",padding:6,display:"flex",alignItems:"center"}}>
              <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",cursor:"pointer",padding:6,display:"flex",alignItems:"center"}}>
              <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
        <div className="main-scroll" style={{paddingTop:16}}>
          {s.tab==="today"&&<TodayTab s={s} d={d} score={score} missions={missions}/>}
          {s.tab==="upcoming"&&<UpcomingTab s={s} d={d}/>}
          {s.tab==="lists"&&<ListsTab s={s} d={d}/>}
          {s.tab==="stats"&&<StatsTab s={s}/>}
          {s.tab==="done"&&<DoneTab s={s} d={d}/>}
        </div>
      </div>

      <div className="tab-bar" style={{background:V.navBg,borderTop:"1px solid "+V.cardBorder,display:"flex",backdropFilter:"blur(12px)",flexShrink:0,paddingTop:8}}>
        {tabs.map(tab=>{
          const active=s.tab===tab.id;
          return(
            <button key={tab.id} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0",WebkitTapHighlightColor:"transparent",position:"relative"}}>
              <span style={{fontSize:18,opacity:active?1:.5}}>{tab.icon}</span>
              <span style={{fontSize:9,fontWeight:active?700:500,color:active?V.accent:V.text3}}>{tab.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:2,background:V.accent,marginTop:-2}}/>}
              {tab.badge>0&&!active&&<div style={{position:"absolute",top:0,right:"calc(50% - 14px)",minWidth:16,height:16,borderRadius:8,background:tab.badgeColor||V.accent,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}><span style={{fontSize:9,fontWeight:800,color:"#03090f",fontFamily:V.mono}}>{tab.badge}</span></div>}
            </button>
          );
        })}
      </div>

      <ToastDisplay/>
      <GlobalConfirm/>
      <UndoToastBar/>
      <XPFloatDisplay/>
      {showConfetti&&<ConfettiEffect onDone={()=>setShowConfetti(false)}/>}
      {celebrating&&celebRank&&<LevelUpCelebration rank={celebRank} onDismiss={dismissLevel}/>}
      {showSearch&&<SearchSheet s={s} d={d} onClose={()=>setShowSearch(false)}/>}
      {showSettings&&<SettingsSheet s={s} d={d} onClose={()=>setShowSettings(false)} onThemeChange={handleThemeChange}/>}
      {showAchievements&&<AchievementsSheet s={s} score={score} onClose={()=>setShowAchievements(false)}/>}
      {showTemplates&&<TemplatesSheet lists={s.lists} onUse={(tpl)=>{const r={id:uid(),title:tpl.title,list:tpl.list,priority:tpl.priority,date:todayStr(),time:"",notes:"",recur:tpl.recur||"none",subtasks:(tpl.subtasks||[]).map(st=>({...st,id:uid(),done:false})),tags:tpl.tags||[],done:false,createdAt:new Date().toISOString()};d({type:"ADD",r});Toast.show("Created from template",V.accent);XPFloat.show(8);setShowTemplates(false);}} onClose={()=>setShowTemplates(false)}/>}
      {showOnboarding&&<Onboarding onDone={()=>setShowOnboarding(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
