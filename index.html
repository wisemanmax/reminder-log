<script>
var loadStatus={};
function loadScript(url,name){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');s.src=url;s.crossOrigin='anonymous';
    s.onload=function(){loadStatus[name]='ok';resolve();};
    s.onerror=function(){loadStatus[name]='FAILED';reject(new Error(name+' failed from '+url));};
    document.head.appendChild(s);
  });
}
function showError(msg){
  document.getElementById('root').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;gap:12px;background:#03090f"><div style="font-size:28px">🚫</div><div style="color:#f87171;font-family:monospace;font-size:13px;line-height:1.6;max-width:320px">'+msg+'</div><div style="color:#64748b;font-size:11px">Check your internet connection and reload</div></div>';
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}
(function(){
  loadScript('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js','React')
  .catch(function(){return loadScript('https://unpkg.com/react@18/umd/react.production.min.js','React');})
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js','ReactDOM')
    .catch(function(){return loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','ReactDOM');});
  })
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js','Recharts')
    .catch(function(){return loadScript('https://unpkg.com/recharts@2.5.0/umd/Recharts.js','Recharts');});
  })
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js','Babel')
    .catch(function(){return loadScript('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js','Babel');});
  })
  .then(function(){
    if(typeof React==='undefined')throw new Error('React not available');
    if(typeof ReactDOM==='undefined')throw new Error('ReactDOM not available');
    if(typeof Recharts==='undefined')throw new Error('Recharts not available');
    if(typeof Babel==='undefined')throw new Error('Babel not available');
    var src=document.getElementById('app-src');
    if(!src)throw new Error('App source not found');
    var compiled;
    try{compiled=Babel.transform(src.textContent,{presets:['react'],plugins:[]}).code;}catch(e){throw new Error('Compile error: '+e.message);}
    var script=document.createElement('script');script.textContent=compiled;document.body.appendChild(script);
  })
  .catch(function(e){showError(e.message);});
})();
</script>

// ─── XP Calculation ───
function calcScore(s){
  let xp=0;
  const reminders=s.reminders||[];
  xp+=reminders.filter(r=>r.done).length*8;
  const defaultIds=["personal","work","health","shopping","errands"];
  xp+=(s.lists||[]).filter(l=>!defaultIds.includes(l.id)).length*15;
  const doneByDay={};reminders.filter(r=>r.done&&r.doneAt).forEach(r=>{const d=r.doneAt.slice(0,10);doneByDay[d]=(doneByDay[d]||0)+1;});
  Object.values(doneByDay).forEach(n=>{if(n>=3)xp+=25;if(n>=5)xp+=25;});
  // Subtask completions bonus
  reminders.forEach(r=>{if(r.subtasks){xp+=r.subtasks.filter(st=>st.done).length*3;}});
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const nextRank=IRON_RANKS.find(r=>r.level===rank.level+1);
  const xpIntoRank=xp-rank.xpNeeded;
  const xpForNext=nextRank?(nextRank.xpNeeded-rank.xpNeeded):null;
  const pct=xpForNext?Math.min(100,Math.round(xpIntoRank/xpForNext*100)):100;
  // Streak
  const sortedDays=Object.keys(doneByDay).sort().reverse();
  let streak=0;
  const td=todayStr();
  let checkDate=new Date(td+"T12:00:00");
  for(let i=0;i<365;i++){
    const ds=checkDate.toISOString().split("T")[0];
    if(doneByDay[ds]){streak++;checkDate.setDate(checkDate.getDate()-1);}
    else if(ds===td){checkDate.setDate(checkDate.getDate()-1);}
    else break;
  }
  return{xp,rank,nextRank,xpIntoRank,xpForNext,pct,streak};
}

// ─── Daily Missions ───
function getDailyMissions(s){
  const td=todayStr();
  const doneToday=(s.reminders||[]).filter(r=>r.done&&r.doneAt&&r.doneAt.startsWith(td));
  const overdueCount=(s.reminders||[]).filter(r=>!r.done&&r.date&&r.date<td).length;
  const totalToday=(s.reminders||[]).filter(r=>!r.done&&r.date===td);
  const allTodayDone=totalToday.length===0&&doneToday.length>0;
  const defaultIds=["personal","work","health","shopping","errands"];
  const hasCustomList=(s.lists||[]).some(l=>!defaultIds.includes(l.id));
  const highPriDone=(s.reminders||[]).some(r=>r.done&&r.priority==="high"&&r.doneAt&&r.doneAt.startsWith(td));
  return[
    {icon:"✅",title:"Complete 3 Reminders",desc:"Check off 3 reminders today",xp:25,done:doneToday.length>=3},
    {icon:"🎯",title:"Clear Today's List",desc:"Complete all of today's reminders",xp:40,done:allTodayDone},
    {icon:"⚡",title:"Tackle High Priority",desc:"Complete a high-priority reminder",xp:20,done:highPriDone},
    {icon:"📋",title:"Create a Custom List",desc:"Add a list beyond the defaults",xp:15,done:hasCustomList},
    {icon:"🔥",title:"No Overdue Items",desc:"Keep your overdue count at zero",xp:20,done:overdueCount===0},
    {icon:"➕",title:"Add a Reminder",desc:"Create at least one new reminder today",xp:10,done:(s.reminders||[]).some(r=>r.createdAt&&r.createdAt.startsWith(td))},
  ];
}

// ─── Notifications ───
const Notif={
  supported:()=>"Notification" in window,
  granted:()=>Notification.permission==="granted",
  request:async()=>{if(!Notif.supported())return false;const r=await Notification.requestPermission();return r==="granted";},
  schedule:(r)=>{
    if(!Notif.granted()||!r.date||!r.time)return;
    const dt=new Date(r.date+"T"+r.time+":00");
    const now=Date.now();
    const diff=dt.getTime()-now;
    if(diff<=0)return;
    const key="notif-"+r.id;
    const existing=parseInt(LS.get(key)||"0");
    if(existing)clearTimeout(existing);
    if(diff<86400000*7){
      const tid=setTimeout(()=>{
        if("serviceWorker" in navigator&&navigator.serviceWorker.controller){
          navigator.serviceWorker.ready.then(reg=>{
            reg.showNotification("ReminderLog",{body:r.title,icon:"./icon.svg",badge:"./icon.svg",tag:r.id,data:{id:r.id}});
          });
        } else {
          new Notification("ReminderLog",{body:r.title,icon:"./icon.svg",tag:r.id});
        }
        LS.set(key,0);
      },diff);
      LS.set(key,tid);
    }
  },
  cancel:(id)=>{const key="notif-"+id;const tid=parseInt(LS.get(key)||"0");if(tid)clearTimeout(tid);LS.set(key,0);},
  scheduleAll:(reminders)=>{reminders.filter(r=>!r.done&&r.date&&r.time).forEach(r=>Notif.schedule(r));},
};

// ─── Level-Up Detection Hook ───
function useLevelUp(score,lsKey){
  const {rank}=score;
  const [celebrating,setCelebrating]=useState(false);
  const [celebRank,setCelebRank]=useState(null);
  useEffect(()=>{
    const saved=parseInt(LS.get(lsKey)||"1");
    if(rank.level>saved){
      LS.set(lsKey,rank.level);
      setCelebRank(rank);
      setTimeout(()=>setCelebrating(true),400);
    } else if(!LS.get(lsKey)){LS.set(lsKey,rank.level);}
  },[rank.level]);
  return{celebrating,celebRank,dismiss:()=>setCelebrating(false)};
}

// ─── Reminder Row with Swipe ───
function ReminderRow({r,lists,onToggle,onDelete,onEdit,onSnooze,bulkMode,selected,onSelect}){
  const overdue=isOverdue(r);
  const listObj=lists.find(l=>l.id===r.list)||lists[0];
  const priObj=PRIORITIES.find(p=>p.id===r.priority)||PRIORITIES[1];
  const [swiped,setSwiped]=useState(0);
  const touchRef=useRef({x:0,y:0,swiping:false});
  const subtasksDone=r.subtasks?r.subtasks.filter(st=>st.done).length:0;
  const subtasksTotal=r.subtasks?r.subtasks.length:0;

  const onTouchStart=(e)=>{
    if(bulkMode)return;
    touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY,swiping:false};
  };
  const onTouchMove=(e)=>{
    if(bulkMode)return;
    const dx=e.touches[0].clientX-touchRef.current.x;
    const dy=e.touches[0].clientY-touchRef.current.y;
    if(!touchRef.current.swiping&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      touchRef.current.swiping=true;
    }
    if(touchRef.current.swiping){
      e.preventDefault();
      setSwiped(Math.max(-100,Math.min(100,dx)));
    }
  };
  const onTouchEnd=()=>{
    if(bulkMode)return;
    if(swiped>60){onToggle(r.id);Haptic.success();Toast.show("Done!",V.green);}
    else if(swiped<-60){
      const backup={...r};
      onDelete(r.id);
      UndoMgr.show("Reminder deleted",()=>onEdit(backup),V.danger);
    }
    setSwiped(0);
    touchRef.current.swiping=false;
  };

  const handleClick=()=>{
    if(bulkMode){onSelect(r.id);return;}
    onEdit(r);
  };

  const bgColor=swiped>30?V.green+"30":swiped<-30?V.danger+"30":"transparent";

  return(
    <div className="fade-up" style={{position:"relative",overflow:"hidden",borderRadius:8,background:bgColor,transition:swiped===0?"background .2s":"none"}}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      {/* Swipe indicators */}
      {swiped>20&&<div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:11,color:V.green,fontWeight:700}}>Complete</div>}
      {swiped<-20&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:11,color:V.danger,fontWeight:700}}>Delete</div>}
      <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 4px",borderBottom:"1px solid rgba(56,189,248,0.04)",opacity:r.done?.5:1,transition:"opacity .3s,transform .15s",transform:"translateX("+swiped+"px)"}}>
        {bulkMode?(
          <button onClick={()=>onSelect(r.id)} style={{width:24,height:24,borderRadius:7,border:"2px solid "+(selected?V.accent:V.text3),background:selected?V.accent:"transparent",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {selected&&<svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="#03090f" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
          </button>
        ):(
          <button onClick={()=>{Haptic.light();onToggle(r.id);if(!r.done)Toast.show("Done!",V.green);}} style={{width:24,height:24,borderRadius:7,border:"2px solid "+(r.done?V.accent:priObj.color),background:r.done?V.accent:"transparent",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
            {r.done&&<svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="#03090f" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
          </button>
        )}
        <div style={{flex:1,minWidth:0}} onClick={handleClick}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{fontSize:14,fontWeight:600,color:r.done?V.text3:V.text,textDecoration:r.done?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"calc(100% - 50px)"}}>{r.title}</span>
            {r.recur!=="none"&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:6,background:V.blue2+"15",color:V.blue2,fontWeight:700,flexShrink:0}}>🔁</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {r.date&&<span style={{fontSize:10,color:overdue?V.danger:r.date===todayStr()?V.warn:V.text3,fontWeight:overdue||r.date===todayStr()?700:400}}>{overdue?"⚠️ ":""}{fmtDate(r.date)}{r.time?" · "+r.time:""}</span>}
            <span style={{fontSize:10,color:listObj.color,fontWeight:600}}>{listObj.icon} {listObj.label}</span>
            {subtasksTotal>0&&<span style={{fontSize:10,color:subtasksDone===subtasksTotal?V.green:V.text3,fontWeight:600}}>{subtasksDone}/{subtasksTotal} subtasks</span>}
          </div>
          {r.notes&&<div style={{fontSize:11,color:V.text3,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.notes}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
          {!bulkMode&&!r.done&&onSnooze&&(
            <button onClick={(e)=>{e.stopPropagation();onSnooze(r);}} style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.5,fontSize:12}}>⏰</button>
          )}
          {!bulkMode&&(
            <button onClick={(e)=>{e.stopPropagation();const backup={...r};Confirm.show("Delete reminder?","",()=>{onDelete(r.id);UndoMgr.show("Reminder deleted",()=>{/* restore handled by parent */},V.danger);});}} style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.4}}>
              <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          )}
          <div style={{width:7,height:7,borderRadius:"50%",background:priObj.color,opacity:.8}}/>
        </div>
      </div>
    </div>
  );
}

// ─── Subtasks Editor ───
function SubtasksEditor({subtasks,onChange}){
  const [newText,setNewText]=useState("");
  const add=()=>{
    if(!newText.trim())return;
    onChange([...subtasks,{id:uid(),text:newText.trim(),done:false}]);
    setNewText("");
  };
  const toggle=(id)=>onChange(subtasks.map(st=>st.id===id?{...st,done:!st.done}:st));
  const remove=(id)=>onChange(subtasks.filter(st=>st.id!==id));
  return(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Subtasks ({subtasks.filter(s=>s.done).length}/{subtasks.length})</div>

        <div key={st.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
          <button onClick={()=>toggle(st.id)} style={{width:18,height:18,borderRadius:5,border:"2px solid "+(st.done?V.green:V.text3),background:st.done?V.green:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {st.done&&<svg width={10} height={10} viewBox="0 0 24 24" fill="none" stroke="#03090f" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
          </button>
          <span style={{flex:1,fontSize:13,color:st.done?V.text3:V.text,textDecoration:st.done?"line-through":"none"}}>{st.text}</span>
          <button onClick={()=>remove(st.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2,opacity:.4}}>
            <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>

      ))}

function SortSelector({sort,setSort}){

        </button>
      ))}

}
function sortReminders(arr,sort){
  if(!sort)return arr;
  const priOrder={high:0,medium:1,low:2};
  return[...arr].sort((a,b)=>{
    if(sort==="date")return(a.date||"9").localeCompare(b.date||"9");
    if(sort==="priority")return(priOrder[a.priority]||1)-(priOrder[b.priority]||1);
    if(sort==="name")return a.title.localeCompare(b.title);
    if(sort==="created")return(b.createdAt||"").localeCompare(a.createdAt||"");
    return 0;
  });
}

// ─── State ───
const init={tab:"today",reminders:[],lists:[...DEFAULT_LISTS],loaded:false};
function reducer(s,a){
  switch(a.type){
    case "INIT":return{...s,...a.p,loaded:true};
    case "TAB":return{...s,tab:a.tab};
    case "ADD":return{...s,reminders:[a.r,...s.reminders]};
    case "UPDATE":return{...s,reminders:s.reminders.map(r=>r.id===a.r.id?a.r:r)};
    case "RESTORE":return{...s,reminders:[a.r,...s.reminders]};
    case "TOGGLE":{
      const r=s.reminders.find(x=>x.id===a.id);
      if(!r)return s;
      const done=!r.done;
      let updated={...r,done,doneAt:done?new Date().toISOString():null};
      if(done&&r.recur&&r.recur!=="none"&&r.date){
        const d=new Date(r.date+"T12:00:00");
        if(r.recur==="daily")d.setDate(d.getDate()+1);
        else if(r.recur==="weekly")d.setDate(d.getDate()+7);
        else if(r.recur==="monthly")d.setMonth(d.getMonth()+1);
        const nextDate=d.toISOString().split("T")[0];
        const next={...r,id:uid(),date:nextDate,done:false,doneAt:null,createdAt:new Date().toISOString()};
        return{...s,reminders:[next,...s.reminders.map(x=>x.id===a.id?updated:x)]};
      }
      return{...s,reminders:s.reminders.map(x=>x.id===a.id?updated:x)};
    }
    case "SNOOZE":{
      return{...s,reminders:s.reminders.map(r=>r.id===a.id?{...r,date:a.date,time:a.time||r.time}:r)};
    }
    case "DELETE":return{...s,reminders:s.reminders.filter(r=>r.id!==a.id)};
    case "BULK_DELETE":return{...s,reminders:s.reminders.filter(r=>!a.ids.includes(r.id))};
    case "BULK_COMPLETE":return{...s,reminders:s.reminders.map(r=>a.ids.includes(r.id)?{...r,done:true,doneAt:new Date().toISOString()}:r)};
    case "BULK_MOVE":return{...s,reminders:s.reminders.map(r=>a.ids.includes(r.id)?{...r,list:a.list}:r)};
    case "ADD_LIST":return{...s,lists:[...s.lists,a.list]};
    case "DEL_LIST":return{...s,lists:s.lists.filter(l=>l.id!==a.id),reminders:s.reminders.filter(r=>r.list!==a.id)};
    case "IMPORT":return{...s,...a.data};
    default:return s;
  }
}

// ─── Calendar View ───
function CalendarView({reminders,onDateClick}){
  const [month,setMonth]=useState(()=>{const d=new Date();return{year:d.getFullYear(),month:d.getMonth()};});
  const daysInMonth=new Date(month.year,month.month+1,0).getDate();
  const firstDay=new Date(month.year,month.month,1).getDay();
  const days=[];
  for(let i=0;i<firstDay;i++)days.push(null);
  for(let i=1;i<=daysInMonth;i++)days.push(i);
  const monthName=new Date(month.year,month.month,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const today=todayStr();
  const prev=()=>{setMonth(m=>m.month===0?{year:m.year-1,month:11}:{...m,month:m.month-1});};
  const next=()=>{setMonth(m=>m.month===11?{year:m.year+1,month:0}:{...m,month:m.month+1});};

  const remindersByDate=useMemo(()=>{
    const map={};
    reminders.filter(r=>!r.done).forEach(r=>{
      if(r.date){if(!map[r.date])map[r.date]=[];map[r.date].push(r);}
    });
    return map;
  },[reminders]);

  return(
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={prev} style={{background:"none",border:"none",cursor:"pointer",padding:8,color:V.accent,fontSize:16}}>◀</button>
        <span style={{fontSize:14,fontWeight:700,color:V.text}}>{monthName}</span>
        <button onClick={next} style={{background:"none",border:"none",cursor:"pointer",padding:8,color:V.accent,fontSize:16}}>▶</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {["S","M","T","W","T","F","S"].map((d,i)=>(
          <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:V.text3,padding:"4px 0"}}>{d}</div>
        ))}
        {days.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const dateStr=month.year+"-"+String(month.month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
          const count=(remindersByDate[dateStr]||[]).length;
          const isT=dateStr===today;
          return(
            <button key={i} onClick={()=>onDateClick(dateStr)} style={{
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              padding:"6px 2px",borderRadius:8,border:isT?"2px solid "+V.accent:"2px solid transparent",
              background:count>0?V.accent+"10":"transparent",cursor:"pointer",minHeight:36
            }}>
              <span style={{fontSize:12,fontWeight:isT?800:500,color:isT?V.accent:V.text}}>{d}</span>
              {count>0&&(
                <div style={{display:"flex",gap:1,marginTop:2}}>
                  {Array.from({length:Math.min(count,3)}).map((_,j)=>(
                    <div key={j} style={{width:4,height:4,borderRadius:2,background:V.accent}}/>
                  ))}
                </div>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── Statistics Tab ───
function StatsTab({s}){
  const reminders=s.reminders||[];
  const done=reminders.filter(r=>r.done);
  const active=reminders.filter(r=>!r.done);
  const total=reminders.length;
  const completionRate=total>0?Math.round(done.length/total*100):0;

  // Last 14 days completion data
  const chartData=useMemo(()=>{
    const data=[];
    for(let i=13;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const ds=d.toISOString().split("T")[0];
      const label=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      const completed=done.filter(r=>r.doneAt&&r.doneAt.startsWith(ds)).length;
      const added=reminders.filter(r=>r.createdAt&&r.createdAt.startsWith(ds)).length;
      data.push({name:label,completed,added});
    }
    return data;
  },[reminders]);

  // By list
  const byList=useMemo(()=>{
    return s.lists.map(l=>({
      name:l.label,
      icon:l.icon,
      color:l.color,
      active:active.filter(r=>r.list===l.id).length,
      done:done.filter(r=>r.list===l.id).length,
      total:reminders.filter(r=>r.list===l.id).length,
    })).filter(l=>l.total>0);
  },[reminders,s.lists]);

  // By priority
  const byPriority=useMemo(()=>{
    return PRIORITIES.map(p=>({
      name:p.label,
      color:p.color,
      value:active.filter(r=>r.priority===p.id).length,

          <div style={{fontSize:22,fontWeight:900,color:V.green,fontFamily:V.mono}}>{done.length}</div>

        </div>

          <div style={{fontSize:10,color:V.text3,fontWeight:600}}>Rate</div>

function SettingsSheet({s,d,onClose}){
  const [notifPerm,setNotifPerm]=useState(()=>Notif.supported()?Notification.permission:"unsupported");
  const fileRef=useRef(null);

  const requestNotifs=async()=>{
    const granted=await Notif.request();
    setNotifPerm(granted?"granted":"denied");
    if(granted){
      Notif.scheduleAll(s.reminders);
      Toast.show("Notifications enabled",V.green);
    }
  };

  const exportData=()=>{
    const data=JSON.stringify({reminders:s.reminders,lists:s.lists,exportDate:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="reminderlog-backup-"+todayStr()+".json";
    a.click();URL.revokeObjectURL(url);
    Toast.show("Exported!",V.green);
  };

  const importData=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(evt)=>{
      try{
        const data=JSON.parse(evt.target.result);
        if(data.reminders&&data.lists){
          Confirm.show("Import data?","This will replace all current reminders and lists.",()=>{
            d({type:"IMPORT",data:{reminders:data.reminders,lists:data.lists}});
            Toast.show("Imported!",V.green);
          });
        }else{Toast.show("Invalid file",V.danger);}
      }catch(err){Toast.show("Invalid JSON",V.danger);}
    };
    reader.readAsText(file);
  };

  const clearAll=()=>{
    Confirm.show("Clear all data?","This will permanently delete all reminders, lists, and settings. This cannot be undone.",()=>{
      LS.set("rl-reminders",[]);
      LS.set("rl-lists",DEFAULT_LISTS);
      d({type:"IMPORT",data:{reminders:[],lists:[...DEFAULT_LISTS]}});
      Toast.show("All data cleared",V.danger);
    });
  };

  return(
    <Sheet title="Settings" onClose={onClose}>
      {/* Theme */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Appearance</div>
        <div style={{display:"flex",gap:8}}>
          {[{id:"dark",label:"Dark",icon:"🌙"},{id:"light",label:"Light",icon:"☀️"}].map(t=>(
            <button key={t.id} onClick={()=>{setTheme(t.id);Toast.show("Theme: "+t.label,V.accent);}} style={{flex:1,padding:"14px",borderRadius:12,border:"1px solid "+(V.mode===t.id?V.accent:V.cardBorder),background:V.mode===t.id?V.accent+"15":"rgba(255,255,255,0.03)",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:4}}>{t.icon}</div>
              <div style={{fontSize:12,fontWeight:600,color:V.mode===t.id?V.accent:V.text3}}>{t.label}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Notifications */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Notifications</div>
        {notifPerm==="unsupported"?(
          <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(255,255,255,0.03)",border:"1px solid "+V.cardBorder}}>
            <div style={{fontSize:13,color:V.text3}}>Notifications not supported in this browser</div>
          </div>
        ):notifPerm==="granted"?(
          <div style={{padding:"12px 14px",borderRadius:12,background:V.green+"08",border:"1px solid "+V.green+"20",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>🔔</span>
            <div style={{fontSize:13,color:V.green,fontWeight:600}}>Notifications enabled</div>
          </div>
        ):(
          <Btn v="secondary" full onClick={requestNotifs}>Enable Notifications</Btn>
        )}
      </div>

      {/* Data */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Data</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <Btn v="secondary" full onClick={exportData}>Export Data (JSON)</Btn>
          <Btn v="secondary" full onClick={()=>fileRef.current?.click()}>Import Data</Btn>
          <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
          <Btn v="danger" full onClick={clearAll}>Clear All Data</Btn>
        </div>

      {/* Stats */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Info</div>
        <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(255,255,255,0.03)",border:"1px solid "+V.cardBorder}}>
          <div style={{fontSize:12,color:V.text3,lineHeight:1.8}}>
            Total reminders: {s.reminders.length}<br/>
            Active: {s.reminders.filter(r=>!r.done).length}<br/>
            Completed: {s.reminders.filter(r=>r.done).length}<br/>
            Lists: {s.lists.length}
          </div>
        </div>
      </div>

      {/* About */}
      <div style={{textAlign:"center",padding:"20px 0",opacity:.5}}>
        <div style={{fontSize:11,color:V.text3}}>ReminderLog v2.0</div>
        <div style={{fontSize:10,color:V.text3}}>Part of the IRONLOG ecosystem</div>
      </div>
    </Sheet>
  );
}

// ─── Onboarding ───
function Onboarding({onDone}){
  const [step,setStep]=useState(0);
  const steps=[
    {icon:"🔔",title:"Welcome to ReminderLog",desc:"Your powerful reminder app with gamification. Track tasks, earn XP, and level up!"},
    {icon:"✅",title:"Quick Add",desc:"Add reminders instantly from the quick-add bar. Assign to lists and set priorities."},
    {icon:"👆",title:"Swipe Actions",desc:"Swipe right to complete, swipe left to delete. Tap to edit and add subtasks."},
    {icon:"📊",title:"Track Progress",desc:"View stats, complete daily missions, and maintain your streak. Let's get started!"},
  ];
  const s=steps[step];
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:V.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{textAlign:"center",maxWidth:320}}>
        <div style={{fontSize:64,marginBottom:16,animation:"fadeUp .4s ease"}} key={step}>{s.icon}</div>
        <div style={{fontSize:22,fontWeight:800,color:V.text,marginBottom:8,animation:"fadeUp .4s ease .1s both"}} key={"t"+step}>{s.title}</div>
        <div style={{fontSize:14,color:V.text3,lineHeight:1.6,marginBottom:32,animation:"fadeUp .4s ease .2s both"}} key={"d"+step}>{s.desc}</div>
        <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:24}}>
          {steps.map((_,i)=><div key={i} style={{width:i===step?20:8,height:8,borderRadius:4,background:i===step?V.accent:V.cardBorder,transition:"all .3s"}}/>)}
        </div>
        {step<steps.length-1?(
          <Btn full onClick={()=>setStep(step+1)}>Next</Btn>
        ):(
          <Btn full onClick={()=>{LS.set("rl-onboarded",true);onDone();}}>Get Started</Btn>
        )}
        {step<steps.length-1&&(
          <button onClick={()=>{LS.set("rl-onboarded",true);onDone();}} style={{marginTop:12,background:"none",border:"none",color:V.text3,fontSize:12,cursor:"pointer",fontFamily:V.font}}>Skip</button>
        )}
      </div>
    </div>,
    document.body
  );
}

// ─── TODAY TAB ───
function TodayTab({s,d,score,missions}){
  const [showEdit,setShowEdit]=useState(null);
  const [sort,setSort]=useState(null);
  const [snoozeTarget,setSnoozeTarget]=useState(null);
  const [bulkMode,setBulkMode]=useState(false);
  const [selected,setSelected]=useState(new Set());
  const today=todayStr();
  const overdue=sortReminders(s.reminders.filter(r=>!r.done&&isOverdue(r)),sort||"date");
  const todayItems=sortReminders(s.reminders.filter(r=>!r.done&&r.date===today),sort||"priority");
  const doneToday=s.reminders.filter(r=>r.done&&r.doneAt&&r.doneAt.startsWith(today));
  const completedPct=todayItems.length+doneToday.length>0?Math.round(doneToday.length/(todayItems.length+doneToday.length)*100):0;
  const greet=(()=>{const h=new Date().getHours();if(h<12)return"Good morning";if(h<17)return"Good afternoon";return"Good evening";})();

  const toggleSelect=(id)=>{const n=new Set(selected);if(n.has(id))n.delete(id);else n.add(id);setSelected(n);};
  const bulkComplete=()=>{if(selected.size===0)return;d({type:"BULK_COMPLETE",ids:[...selected]});Toast.show(selected.size+" completed",V.green);setBulkMode(false);setSelected(new Set());};
  const bulkDelete=()=>{if(selected.size===0)return;Confirm.show("Delete "+selected.size+" reminders?","",()=>{d({type:"BULK_DELETE",ids:[...selected]});Toast.show(selected.size+" deleted",V.danger);setBulkMode(false);setSelected(new Set());});};

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:12,background:score.rank.color+"10",border:"1px solid "+score.rank.color+"25",cursor:"pointer"}}>
        <IronScoreCard score={score} compact={true}/>
        <div style={{marginLeft:"auto",fontSize:9,color:V.text3,textAlign:"right"}}>Level {score.rank.level}<br/>{score.pct}% to next</div>
      </div>
      <MissionsPanel missions={missions}/>
      <QuickAdd lists={s.lists} onAdd={(r)=>d({type:"ADD",r})}/>

      <div style={{padding:"10px 0 2px"}}>
        <div style={{fontSize:20,fontWeight:800,color:V.text}}>{greet} 👋</div>
        <div style={{fontSize:12,color:V.text3}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
      </div>

      {/* Sort + Bulk */}
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <SortSelector sort={sort} setSort={setSort}/>
        <button onClick={()=>{setBulkMode(!bulkMode);setSelected(new Set());}} style={{marginLeft:"auto",padding:"4px 10px",borderRadius:12,border:"none",fontSize:10,fontWeight:600,fontFamily:V.font,cursor:"pointer",background:bulkMode?V.accent+"15":"rgba(255,255,255,0.03)",color:bulkMode?V.accent:V.text3}}>
          {bulkMode?"Cancel":"Select"}
        </button>
      </div>

      {bulkMode&&selected.size>0&&(
        <div style={{display:"flex",gap:6}}>
          <Btn v="small" s={{flex:1}} onClick={bulkComplete}>Complete ({selected.size})</Btn>
          <Btn v="danger" s={{flex:1,minHeight:36,fontSize:12,borderRadius:10,padding:"8px 14px"}} onClick={bulkDelete}>Delete ({selected.size})</Btn>
        </div>
      )}

      {/* Progress */}
      {(todayItems.length+doneToday.length)>0&&(
        <div style={{padding:"12px 14px",borderRadius:12,background:V.accent+"06",border:"1px solid "+V.accent+"15"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,color:V.text2,fontWeight:600}}>Today's progress</span>
            <span style={{fontSize:12,color:V.accent,fontWeight:700,fontFamily:V.mono}}>{doneToday.length}/{todayItems.length+doneToday.length}</span>
          </div>
          <div style={{width:"100%",height:6,borderRadius:3,background:"rgba(255,255,255,0.05)"}}>
            <div style={{height:"100%",borderRadius:3,width:completedPct+"%",background:"linear-gradient(90deg,"+V.accent+","+V.accent2+")",transition:"width .5s"}}/>
          </div>
        </div>
      )}

      {/* Overdue */}
      {overdue.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,color:V.danger,letterSpacing:".06em",marginBottom:4}}>⚠️ OVERDUE ({overdue.length})</div>
          {overdue.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
            onToggle={(id)=>{d({type:"TOGGLE",id});Haptic.success();}}
            onDelete={(id)=>{const backup=s.reminders.find(x=>x.id===id);d({type:"DELETE",id});if(backup)UndoMgr.show("Deleted",()=>d({type:"RESTORE",r:backup}),V.danger);}}
            onEdit={(r)=>setShowEdit(r)}
            onSnooze={(r)=>setSnoozeTarget(r)}
            bulkMode={bulkMode} selected={selected.has(r.id)} onSelect={toggleSelect}/>)}
        </div>
      )}

      {/* Today */}
      {todayItems.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,letterSpacing:".06em",marginBottom:4}}>TODAY ({todayItems.length})</div>
          {todayItems.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
            onToggle={(id)=>{d({type:"TOGGLE",id});Haptic.success();}}
            onDelete={(id)=>{const backup=s.reminders.find(x=>x.id===id);d({type:"DELETE",id});if(backup)UndoMgr.show("Deleted",()=>d({type:"RESTORE",r:backup}),V.danger);}}
            onEdit={(r)=>setShowEdit(r)}
            onSnooze={(r)=>setSnoozeTarget(r)}
            bulkMode={bulkMode} selected={selected.has(r.id)} onSelect={toggleSelect}/>)}
        </div>
      )}

      {/* Completed today */}
      {doneToday.length>0&&(
        <div style={{opacity:.6}}>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,letterSpacing:".06em",marginBottom:4}}>COMPLETED ({doneToday.length})</div>
          {doneToday.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
            onToggle={(id)=>d({type:"TOGGLE",id})}
            onDelete={(id)=>d({type:"DELETE",id})}
            onEdit={(r)=>setShowEdit(r)}/>)}
        </div>
      )}

      {overdue.length===0&&todayItems.length===0&&doneToday.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:V.text3}}>
          <div style={{fontSize:48,marginBottom:12}}>✨</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>All clear!</div>
          <div style={{fontSize:13}}>Nothing due today. Add a reminder above.</div>
        </div>
      )}

      {showEdit&&<EditSheet r={showEdit} lists={s.lists} onSave={(u)=>{d({type:"UPDATE",r:u});Toast.show("Updated",V.accent);}} onClose={()=>setShowEdit(null)}/>}
      {snoozeTarget&&<SnoozeMenu onSnooze={(date,time)=>{d({type:"SNOOZE",id:snoozeTarget.id,date,time});Toast.show("Snoozed to "+fmtDate(date),V.accent);}} onClose={()=>setSnoozeTarget(null)}/>}
    </div>
  );
}

// ─── UPCOMING TAB ───
function UpcomingTab({s,d}){
  const [showEdit,setShowEdit]=useState(null);
  const [filterList,setFilterList]=useState("all");
  const [sort,setSort]=useState(null);
  const [viewMode,setViewMode]=useState("list");
  const [snoozeTarget,setSnoozeTarget]=useState(null);
  const [selectedDate,setSelectedDate]=useState(null);
  const today=todayStr();

  let upcoming=s.reminders.filter(r=>!r.done&&r.date>today).filter(r=>filterList==="all"||r.list===filterList);
  if(selectedDate)upcoming=upcoming.filter(r=>r.date===selectedDate);
  upcoming=sortReminders(upcoming,sort||"date");
  const noDate=s.reminders.filter(r=>!r.done&&!r.date).filter(r=>filterList==="all"||r.list===filterList);

  const grouped=useMemo(()=>{
    const map={};
    upcoming.forEach(r=>{const key=r.date||"no-date";if(!map[key])map[key]=[];map[key].push(r);});
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  },[upcoming]);

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <QuickAdd lists={s.lists} onAdd={(r)=>d({type:"ADD",r})}/>

      {/* View toggle */}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={()=>{setViewMode("list");setSelectedDate(null);}} style={{padding:"5px 12px",borderRadius:10,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:V.font,background:viewMode==="list"?V.accent+"15":"rgba(255,255,255,0.03)",color:viewMode==="list"?V.accent:V.text3}}>List</button>
        <button onClick={()=>setViewMode("calendar")} style={{padding:"5px 12px",borderRadius:10,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:V.font,background:viewMode==="calendar"?V.accent+"15":"rgba(255,255,255,0.03)",color:viewMode==="calendar"?V.accent:V.text3}}>Calendar</button>
        <div style={{flex:1}}/>
        <SortSelector sort={sort} setSort={setSort}/>
      </div>

      {/* List filter */}
      <div style={{display:"flex",gap:5,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:2}}>
        <button onClick={()=>setFilterList("all")} style={{padding:"6px 12px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,fontFamily:V.font,cursor:"pointer",background:filterList==="all"?V.accent+"15":"rgba(255,255,255,0.04)",color:filterList==="all"?V.accent:V.text3,whiteSpace:"nowrap"}}>All</button>
        {s.lists.map(l=>(
          <button key={l.id} onClick={()=>setFilterList(filterList===l.id?"all":l.id)} style={{padding:"6px 12px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,fontFamily:V.font,cursor:"pointer",background:filterList===l.id?l.color+"15":"rgba(255,255,255,0.04)",color:filterList===l.id?l.color:V.text3,whiteSpace:"nowrap"}}>
            {l.icon} {l.label}
          </button>
        ))}
      </div>

      {/* Calendar */}
      {viewMode==="calendar"&&(
        <CalendarView reminders={s.reminders} onDateClick={(d)=>setSelectedDate(selectedDate===d?null:d)}/>
      )}
      {selectedDate&&<div style={{fontSize:11,color:V.accent,fontWeight:600}}>Showing: {fmtFull(selectedDate)} <button onClick={()=>setSelectedDate(null)} style={{background:"none",border:"none",color:V.text3,cursor:"pointer",fontSize:11,fontFamily:V.font}}>Clear</button></div>}

      {grouped.map(([date,items])=>(
        <div key={date}>
          <div style={{fontSize:10,fontWeight:700,color:V.accent2,letterSpacing:".06em",marginBottom:4,textTransform:"uppercase"}}>{fmtFull(date)}</div>
          {items.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
            onToggle={(id)=>{d({type:"TOGGLE",id});Haptic.success();}}
            onDelete={(id)=>{const backup=s.reminders.find(x=>x.id===id);d({type:"DELETE",id});if(backup)UndoMgr.show("Deleted",()=>d({type:"RESTORE",r:backup}),V.danger);}}
            onEdit={(r)=>setShowEdit(r)}
            onSnooze={(r)=>setSnoozeTarget(r)}/>)}
        </div>
      ))}

      {noDate.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,letterSpacing:".06em",marginBottom:4}}>SOMEDAY</div>
          {noDate.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
            onToggle={(id)=>{d({type:"TOGGLE",id});Haptic.success();}}
            onDelete={(id)=>{const backup=s.reminders.find(x=>x.id===id);d({type:"DELETE",id});if(backup)UndoMgr.show("Deleted",()=>d({type:"RESTORE",r:backup}),V.danger);}}
            onEdit={(r)=>setShowEdit(r)}
            onSnooze={(r)=>setSnoozeTarget(r)}/>)}
        </div>
      )}

      {grouped.length===0&&noDate.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:V.text3}}>
          <div style={{fontSize:48,marginBottom:12}}>📅</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>Nothing upcoming</div>
          <div style={{fontSize:13}}>Reminders with future dates will appear here</div>
        </div>
      )}

      {showEdit&&<EditSheet r={showEdit} lists={s.lists} onSave={(u)=>{d({type:"UPDATE",r:u});Toast.show("Updated",V.accent);}} onClose={()=>setShowEdit(null)}/>}
      {snoozeTarget&&<SnoozeMenu onSnooze={(date,time)=>{d({type:"SNOOZE",id:snoozeTarget.id,date,time});Toast.show("Snoozed to "+fmtDate(date),V.accent);}} onClose={()=>setSnoozeTarget(null)}/>}
    </div>
  );
}

// ─── LISTS TAB ───
function ListsTab({s,d}){
  const [showEdit,setShowEdit]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [newList,setNewList]=useState({label:"",icon:"📝",color:V.accent});
  const LIST_COLORS=[V.accent,"#60a5fa","#a78bfa","#f472b6","#34d399","#fbbf24","#f87171","#fb923c"];
  const LIST_ICONS=["📝","💼","🏠","🛒","💊","🎯","📚","✈️","🎮","💪","🍔","🎵","🌱","🐾","🔧"];

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:10}}>
      {s.lists.map(list=>{
        const count=s.reminders.filter(r=>r.list===list.id&&!r.done).length;
        const done=s.reminders.filter(r=>r.list===list.id&&r.done).length;
        return(
          <div key={list.id} onClick={()=>setShowEdit({list,items:s.reminders.filter(r=>r.list===list.id)})} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:14,background:V.card,border:"1px solid "+V.cardBorder,cursor:"pointer"}}>
            <div style={{width:40,height:40,borderRadius:12,background:list.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{list.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:V.text}}>{list.label}</div>
              <div style={{fontSize:11,color:V.text3}}>{count} remaining · {done} done</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {count>0&&<div style={{minWidth:22,height:22,borderRadius:11,background:list.color+"20",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 6px"}}><span style={{fontSize:11,fontWeight:800,color:list.color,fontFamily:V.mono}}>{count}</span></div>}
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>
        );
      })}

      <Btn v="secondary" full onClick={()=>setShowNew(true)}>+ New List</Btn>

      {showNew&&(
        <Sheet title="New List" onClose={()=>setShowNew(false)} footer={<Btn full onClick={()=>{if(!newList.label.trim())return;d({type:"ADD_LIST",list:{id:uid(),...newList}});Toast.show("List created",V.accent);setShowNew(false);setNewList({label:"",icon:"📝",color:V.accent});}}>Create List</Btn>}>
          <Field label="List Name" value={newList.label} onChange={v=>setNewList(l=>({...l,label:v}))} placeholder="e.g. Weekend plans" autoFocus/>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Icon</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {LIST_ICONS.map(ico=>(
                <button key={ico} onClick={()=>setNewList(l=>({...l,icon:ico}))} style={{width:38,height:38,borderRadius:10,border:"2px solid "+(newList.icon===ico?V.accent:V.cardBorder),background:newList.icon===ico?V.accent+"15":"rgba(255,255,255,0.03)",fontSize:18,cursor:"pointer"}}>{ico}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Color</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {LIST_COLORS.map(c=>(
                <button key={c} onClick={()=>setNewList(l=>({...l,color:c}))} style={{width:32,height:32,borderRadius:8,background:c,border:"2px solid "+(newList.color===c?"#fff":"transparent"),cursor:"pointer"}}/>
              ))}
            </div>
          </div>
        </Sheet>
      )}

      {showEdit&&(
        <Sheet title={showEdit.list.label} onClose={()=>setShowEdit(null)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:13,color:V.text3}}>{showEdit.items.filter(r=>!r.done).length} remaining</div>
            {!DEFAULT_LISTS.find(l=>l.id===showEdit.list.id)&&(
              <Btn v="danger" s={{minHeight:32,padding:"6px 14px",fontSize:12}} onClick={()=>{Confirm.show("Delete \""+showEdit.list.label+"\"?","All reminders in this list will also be deleted.",()=>{d({type:"DEL_LIST",id:showEdit.list.id});setShowEdit(null);});}}>Delete List</Btn>
            )}
          </div>
          {showEdit.items.filter(r=>!r.done).map(r=>(
            <ReminderRow key={r.id} r={r} lists={s.lists}
              onToggle={(id)=>{d({type:"TOGGLE",id});Toast.show("Done!",V.green);}}
              onDelete={(id)=>d({type:"DELETE",id})} onEdit={()=>{}}/>
          ))}
          {showEdit.items.filter(r=>r.done).length>0&&(
            <div style={{marginTop:12,opacity:.5}}>
              <div style={{fontSize:10,color:V.text3,fontWeight:600,marginBottom:4}}>COMPLETED</div>
              {showEdit.items.filter(r=>r.done).slice(0,5).map(r=>(
                <ReminderRow key={r.id} r={r} lists={s.lists}
                  onToggle={(id)=>d({type:"TOGGLE",id})}
                  onDelete={(id)=>d({type:"DELETE",id})} onEdit={()=>{}}/>
              ))}
            </div>
          )}
        </Sheet>
      )}
    </div>
  );
}

// ─── DONE TAB ───
function DoneTab({s,d}){
  const done=s.reminders.filter(r=>r.done).sort((a,b)=>(b.doneAt||"").localeCompare(a.doneAt||""));
  const clearAll=()=>Confirm.show("Clear completed?","All completed reminders will be permanently deleted.",()=>{done.forEach(r=>d({type:"DELETE",id:r.id}));Toast.show("Cleared",V.accent);});
  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:4}}>
      {done.length>0&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:12,color:V.text3}}>{done.length} completed</div>
          <Btn v="danger" s={{minHeight:32,padding:"6px 14px",fontSize:12}} onClick={clearAll}>Clear All</Btn>
        </div>
      )}
      {done.map(r=><ReminderRow key={r.id} r={r} lists={s.lists}
        onToggle={(id)=>d({type:"TOGGLE",id})}
        onDelete={(id)=>d({type:"DELETE",id})}
        onEdit={()=>{}}/>)}
      {done.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:V.text3}}><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>No completed reminders</div><div style={{fontSize:13}}>Complete a reminder and it'll show up here</div></div>}
    </div>
  );
}

// ─── APP ───
function App(){
  const [s,d]=useReducer(reducer,init);
  const [showSearch,setShowSearch]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(()=>!LS.get("rl-onboarded"));

  const score=useMemo(()=>calcScore(s),[s.reminders,s.lists]);
  const missions=useMemo(()=>getDailyMissions(s),[s.reminders,s.lists]);
  const {celebrating,celebRank,dismiss:dismissLevel}=useLevelUp(score,"rl-last-level");

  useEffect(()=>{
    const reminders=LS.get("rl-reminders")||[];
    const lists=LS.get("rl-lists")||DEFAULT_LISTS;
    // Migrate old reminders without subtasks
    const migrated=reminders.map(r=>({...r,subtasks:r.subtasks||[]}));
    d({type:"INIT",p:{reminders:migrated,lists}});
    // Schedule notifications for existing reminders
    if(Notif.granted())Notif.scheduleAll(migrated);
  },[]);

  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("rl-reminders",s.reminders);
    LS.set("rl-lists",s.lists);
  },[s.reminders,s.lists,s.loaded]);

  if(!s.loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:V.bg,flexDirection:"column",gap:12}}><div style={{fontSize:36}}>🔔</div><div style={{fontSize:11,color:V.text3,fontFamily:V.mono,animation:"pulse 1.5s infinite"}}>Loading...</div></div>;

  const overdueCount=s.reminders.filter(r=>!r.done&&isOverdue(r)).length;
  const todayCount=s.reminders.filter(r=>!r.done&&r.date===todayStr()).length;
  const tabs=[
    {id:"today",label:"Today",icon:"🏠",badge:overdueCount>0?overdueCount:todayCount>0?todayCount:0,badgeColor:overdueCount>0?V.danger:V.accent},
    {id:"upcoming",label:"Upcoming",icon:"📅",badge:0},
    {id:"lists",label:"Lists",icon:"📋",badge:0},
    {id:"stats",label:"Stats",icon:"📊",badge:0},
    {id:"done",label:"Done",icon:"✅",badge:0},
  ];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:V.bg}}>
      {/* Header */}
      <div style={{paddingTop:"max(16px,env(safe-area-inset-top,0px))",paddingLeft:16,paddingRight:16,paddingBottom:10,background:V.navBg,borderBottom:"1px solid "+V.cardBorder,flexShrink:0,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:22}}>🔔</span>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:V.text,lineHeight:1}}>ReminderLog</div>
              <div style={{fontSize:9,color:V.text3,fontWeight:600,letterSpacing:".1em"}}>by IRONLOG</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {overdueCount>0&&<div style={{padding:"4px 10px",borderRadius:20,background:V.danger+"20",border:"1px solid "+V.danger+"30"}}><span style={{fontSize:11,fontWeight:800,color:V.danger}}>{overdueCount} overdue</span></div>}
            <button onClick={()=>setShowSearch(true)} style={{background:"none",border:"none",cursor:"pointer",padding:8,display:"flex",alignItems:"center"}}>
              <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",cursor:"pointer",padding:8,display:"flex",alignItems:"center"}}>
              <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
        <div className="main-scroll" style={{paddingTop:16}}>
          {s.tab==="today"&&<TodayTab s={s} d={d} score={score} missions={missions}/>}
          {s.tab==="upcoming"&&<UpcomingTab s={s} d={d}/>}
          {s.tab==="lists"&&<ListsTab s={s} d={d}/>}
          {s.tab==="stats"&&<StatsTab s={s}/>}
          {s.tab==="done"&&<DoneTab s={s} d={d}/>}
        </div>
      </div>

      {/* Tab Bar */}
      <div className="tab-bar" style={{background:V.navBg,borderTop:"1px solid "+V.cardBorder,display:"flex",backdropFilter:"blur(12px)",flexShrink:0,paddingTop:8}}>
        {tabs.map(tab=>{
          const active=s.tab===tab.id;
          return(
            <button key={tab.id} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0",WebkitTapHighlightColor:"transparent",position:"relative"}}>
              <span style={{fontSize:18,opacity:active?1:.5}}>{tab.icon}</span>
              <span style={{fontSize:9,fontWeight:active?700:500,color:active?V.accent:V.text3}}>{tab.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:2,background:V.accent,marginTop:-2}}/>}
              {tab.badge>0&&!active&&<div style={{position:"absolute",top:0,right:"calc(50% - 14px)",minWidth:16,height:16,borderRadius:8,background:tab.badgeColor||V.accent,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}><span style={{fontSize:9,fontWeight:800,color:"#03090f",fontFamily:V.mono}}>{tab.badge}</span></div>}
            </button>
          );
        })}
      </div>

      {/* Overlays */}
      <ToastDisplay/>
      <GlobalConfirm/>
      <UndoToastBar/>
      {celebrating&&celebRank&&<LevelUpCelebration rank={celebRank} onDismiss={dismissLevel}/>}
      {showSearch&&<SearchSheet s={s} d={d} onClose={()=>setShowSearch(false)}/>}
      {showSettings&&<SettingsSheet s={s} d={d} onClose={()=>setShowSettings(false)}/>}
      {showOnboarding&&<Onboarding onDone={()=>setShowOnboarding(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
